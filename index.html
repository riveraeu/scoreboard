// Simple localStorage cache to avoid redundant Worker requests
function lsGet(key, ttlMs) {
  try {
    const raw = localStorage.getItem(key);
    if (!raw) return null;
    const { ts, data } = JSON.parse(raw);
    if (Date.now() - ts > ttlMs) return null;
    return data;
  } catch { return null; }
}
function lsSet(key, data) {
  try { localStorage.setItem(key, JSON.stringify({ ts: Date.now(), data })); } catch {}
}

// abbrs that exist in >1 sport — these need ?sport= param when linking to a non-default sport
const _multiSportAbbrs = (() => {
  const seen = {}; TEAM_DB.forEach(t => { seen[t.abbr] = (seen[t.abbr] || 0) + 1; });
  return new Set(Object.keys(seen).filter(a => seen[a] > 1));
})();
function teamUrl(abbr, sport) {
  const upper = abbr.toUpperCase();
  // default sport = first entry for this abbr (MLB > NBA > NHL by TEAM_DB order)
  const defaultSport = TEAM_DB.find(t => t.abbr === upper)?.sport;
  return `/${upper}${_multiSportAbbrs.has(upper) && sport !== defaultSport ? `?sport=${sport}` : ""}`;
}
function slugify(name) {
  return name.normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\s+/g,"");
}

const TOTAL_THRESHOLDS = {
  mlb: [5,6,7,8,9,10,11],
  nba: [200,210,215,220,225,230,235,240,250],
  nhl: [3,4,5,6,7,8],
};

function TotalsBarChart({ gameLog, sport, tonightTotalMap, tonightPlay, trackedPlays, onTrack, onUntrack }) {
  const thresholds = TOTAL_THRESHOLDS[sport] || [5,6,7,8,9,10];
  const completed = (gameLog || []).filter(g => g.result);

  const data = thresholds.map(t => {
    const count = completed.filter(g => g.total >= t).length;
    const pct = completed.length > 0 ? (count / completed.length) * 100 : 0;
    return { t, count, pct };
  });

  return (
    <div>
      {data.map(({ t, count, pct }) => {
        const tp = tonightTotalMap?.[t] ?? null;
        const lineLabel = `O${(t - 0.5).toFixed(1)}`;

        const kalshiPct = tp?.kalshiPct ?? null;
        const modelPct = tp?.truePct ?? null;
        const edge = tp?.edge ?? null;
        const edgeColor = edge == null ? "#484f58" : edge >= 3 ? "#3fb950" : edge >= 0 ? "#e3b341" : "#f78166";

        const trackId = tp ? `total|${tp.sport}|${tp.homeTeam}|${tp.awayTeam}|${t}|${tp.gameDate || ""}` : null;
        const _tAnchor = tp ?? tonightPlay;
        const _localToday = (() => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; })();
        const _existingTotalPick = _tAnchor ? (trackedPlays || []).find(p => {
          const [pt,ps,ph,pa,pth,pd] = p.id.split("|");
          return pt==="total" && ps===_tAnchor.sport && ph===_tAnchor.homeTeam && pa===_tAnchor.awayTeam && String(pth)===String(t) && (!pd || pd >= _localToday);
        }) : null;
        const isTracked = !!_existingTotalPick || !!(trackId && (trackedPlays || []).some(p => p.id === trackId));
        const _untrackId = _existingTotalPick?.id ?? trackId;
        const canTrack = tp != null && (tp.kalshiPct ?? 0) >= 70 && edge != null && edge >= 3;
        const trackBtn = canTrack ? (
          <button
            onClick={() => isTracked ? onUntrack(_untrackId) : onTrack({ ...tp, threshold: t })}
            title={isTracked ? "Remove pick" : "Add to My Picks"}
            style={{background:isTracked?"rgba(63,185,80,0.15)":"transparent",
              border:`1px solid ${isTracked?"#3fb950":"#30363d"}`,
              borderRadius:6,padding:"1px 6px",cursor:"pointer",
              color:isTracked?"#3fb950":"#484f58",fontSize:13,lineHeight:1,flexShrink:0}}>
            {isTracked ? "★" : "☆"}
          </button>
        ) : null;

        // Primary bar: model% when tonight data available, else hist%
        const hasTonightData = modelPct != null;
        const primaryPct = hasTonightData ? modelPct : pct;
        const barColor = tierColor(primaryPct);
        const labelColor = tp ? "#c9d1d9" : "#8b949e";

        return (
          <div key={t} style={{display:"flex",gap:10,marginBottom:14,alignItems:"flex-start"}}>
            <div style={{color:labelColor,fontSize:13,width:40,textAlign:"right",
              flexShrink:0,paddingTop:2,fontWeight:400}}>
              {lineLabel}
            </div>
            <div style={{flex:1,display:"flex",flexDirection:"column",gap:5}}>
              {/* Primary bar (model when available, else hist) */}
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{flex:1,background:"#21262d",borderRadius:5,height:18,overflow:"hidden"}}>
                  <div style={{width:`${primaryPct}%`,background:barColor,height:"100%",borderRadius:5,
                    transition:"width 0.5s ease",minWidth:primaryPct>0?4:0}}/>
                </div>
                <div style={{color:barColor,fontSize:13,fontWeight:700,width:42,textAlign:"right",flexShrink:0}}>
                  {primaryPct.toFixed(1)}%
                </div>
                <div style={{flexShrink:0,width:110,display:"flex",alignItems:"center",gap:4}}>
                  <span style={{color:"#484f58",fontSize:10,flex:1}}>{count}/{completed.length}g</span>
                  {hasTonightData && edge != null && (
                    <span style={{display:"flex",alignItems:"center",gap:3}}>
                      <span style={{background:edgeColor+"22",border:`1px solid ${edgeColor}`,borderRadius:4,
                        padding:"1px 5px",fontSize:10,fontWeight:700,color:edgeColor,whiteSpace:"nowrap"}}>
                        {edge >= 0 ? "+" : ""}{edge}%
                      </span>
                    </span>
                  )}
                  {trackBtn}
                </div>
              </div>
              {/* Kalshi price bar */}
              {kalshiPct != null && (() => {
                const kOdds = kalshiPct >= 50 ? Math.round(-(kalshiPct/(100-kalshiPct))*100) : Math.round((100-kalshiPct)/kalshiPct*100);
                const kOddsStr = kOdds > 0 ? `+${kOdds}` : `${kOdds}`;
                return (
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <div style={{flex:1,background:"#21262d",borderRadius:4,height:11,overflow:"hidden"}}>
                      <div style={{width:`${kalshiPct}%`,background:"#6e40c9",height:"100%",borderRadius:4,
                        transition:"width 0.5s ease",minWidth:kalshiPct>0?2:0}}/>
                    </div>
                    <div style={{color:"#6e40c9",fontSize:11,fontWeight:600,width:42,textAlign:"right",flexShrink:0}}>
                      {kalshiPct}%
                    </div>
                    <div style={{color:"#6e40c9",fontSize:10,width:110,flexShrink:0,paddingLeft:2}}>
                      {`(${kOddsStr})`}
                    </div>
                  </div>
                );
              })()}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function TeamPage({ abbr, sport, teamPageData, tonightPlays, allTonightPlays, onBack, navigateToTeam, navigateToPlayer, trackedPlays, trackPlay, untrackPlay }) {
  const [glSort, setGlSort] = React.useState({ col:"date", dir:"desc" });

  const { loading, error, data } = teamPageData || {};
  const sportLabel = { mlb:"MLB", nba:"NBA", nhl:"NHL" }[sport] || sport.toUpperCase();
  const logoUrl = `https://a.espncdn.com/i/teamlogos/${sport}/500/${abbr.toLowerCase()}.png`;

  // All total plays for this team across all thresholds (from unfiltered allTonightPlays)
  const tonightTotals = (allTonightPlays || tonightPlays || []).filter(p =>
    p.gameType === "total" && p.sport === sport &&
    (p.homeTeam?.toUpperCase() === abbr || p.awayTeam?.toUpperCase() === abbr)
  );
  const tonightTotalMap = Object.fromEntries(tonightTotals.map(p => [p.threshold, p]));
  // Best play: earliest gameDate first, then highest edge among qualified
  const _tq = tonightTotals.filter(p => p.qualified !== false);
  const _tPool = _tq.length > 0 ? _tq : tonightTotals;
  const _tMinDate = _tPool.reduce((min, p) => (p.gameDate||"") < min ? (p.gameDate||"") : min, _tPool[0]?.gameDate||"");
  const tonightPlay = _tPool.filter(p => p.gameDate === _tMinDate).sort((a,b) => (b.edge||0) - (a.edge||0))[0] ?? null;

  if (loading) return (
    <div style={{textAlign:"center",padding:52,color:"#8b949e",fontSize:13}}>Loading {abbr} data…</div>
  );
  if (error) return (
    <div style={{textAlign:"center",padding:40,color:"#f78166",fontSize:13}}>Error: {error}</div>
  );
  if (!data) return null;

  const { teamName, record, wins, losses, gameLog, seasonStats, lineup, lineupConfirmed, nextGame } = data;

  // Game log sort
  const sortedGL = [...(gameLog || [])].sort((a, b) => {
    const { col, dir } = glSort;
    let va = a[col], vb = b[col];
    if (col === "isHome") { va = a.isHome ? 0 : 1; vb = b.isHome ? 0 : 1; }
    if (col === "result") { va = a.result || ""; vb = b.result || ""; }
    const cmp = typeof va === "string" ? va.localeCompare(vb) : (va ?? 0) - (vb ?? 0);
    return dir === "desc" ? -cmp : cmp;
  });

  const glCols = [
    { key:"date",    label:"Date",  align:"left"   },
    { key:"isHome",  label:"H/A",   align:"center" },
    { key:"opp",     label:"Opp",   align:"left"   },
    { key:"teamScore",label:"Us",                   },
    { key:"oppScore", label:"Opp",                  },
    { key:"total",   label:"Total",                 },
    { key:"result",  label:"W/L",                   },
  ];

  const thStyle = (col) => {
    const active = glSort.col === col;
    return {
      padding:"3px 8px", fontSize:10, textAlign: glCols.find(c=>c.key===col)?.align||"right",
      color: active ? "#c9d1d9" : "#484f58", cursor:"pointer", userSelect:"none",
      background:"#0d1117", position:"sticky", top:0,
    };
  };
  const toggleSort = col => setGlSort(prev =>
    prev.col === col ? { col, dir: prev.dir === "desc" ? "asc" : "desc" } : { col, dir: "desc" }
  );

  return (
    <div style={{marginBottom:20}}>
      <button onClick={onBack}
        style={{background:"none",border:"none",color:"#8b949e",fontSize:13,cursor:"pointer",
          padding:"0 0 12px 0",display:"flex",alignItems:"center",gap:4}}>
        ← Back
      </button>

      {/* Header */}
      <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:16}}>
        <img src={logoUrl} alt={abbr}
          onError={e => e.target.style.visibility="hidden"}
          style={{width:52,height:52,objectFit:"contain",background:"#161b22",borderRadius:8,padding:4,flexShrink:0}}/>
        <div>
          <h1 style={{color:"#fff",margin:0,fontSize:19,fontWeight:700}}>{teamName}</h1>
          <div style={{color:"#8b949e",fontSize:12}}>{sportLabel} 2025-26{record ? ` · ${record}` : ""}</div>
          {(nextGame?.gameTime || tonightPlay?.gameTime) && (() => {
            const src = nextGame?.gameTime ? nextGame : tonightPlay;
            const d = new Date(src.gameTime);
            const ptFmt = new Intl.DateTimeFormat("en-CA",{timeZone:"America/Los_Angeles"});
            const gamePT = ptFmt.format(d), todayPT = ptFmt.format(new Date()), tmrwPT = ptFmt.format(new Date(Date.now()+86400000));
            const dayLabel = gamePT === todayPT ? "Today" : gamePT === tmrwPT ? "Tomorrow" : new Intl.DateTimeFormat("en-US",{timeZone:"America/Los_Angeles",month:"short",day:"numeric"}).format(d);
            const timePart = new Intl.DateTimeFormat("en-US",{timeZone:"America/Los_Angeles",hour:"numeric",minute:"2-digit",hour12:true}).format(d);
            return <div style={{color:"#6e7681",fontSize:11,marginTop:2}}>{dayLabel} · {timePart} PT</div>;
          })()}
        </div>
        <div style={{marginLeft:"auto",display:"flex",gap:8}}>
          {[["W",wins],["L",losses],["Avg",seasonStats.avgTotal ?? "—"]].map(([l,v]) => (
            <div key={l} style={{background:"#161b22",border:"1px solid #30363d",borderRadius:8,padding:"7px 11px",textAlign:"center"}}>
              <div style={{color:"#58a6ff",fontSize:15,fontWeight:700}}>{v}</div>
              <div style={{color:"#8b949e",fontSize:10}}>{l}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Content card */}
      <div style={{background:"#161b22",border:"1px solid #30363d",borderRadius:12,padding:"20px 22px"}}>

        {/* Tonight's game explanation */}
        {tonightPlay && (() => {
          const tp = tonightPlay;
          const _isHome = tp.homeTeam?.toUpperCase() === abbr;
          const _opp = _isHome ? tp.awayTeam : tp.homeTeam;
          const matchupHeader = (
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
              <img src={`https://a.espncdn.com/i/teamlogos/${sport}/500/${(_opp||"").toLowerCase()}.png`}
                style={{width:18,height:18,objectFit:"contain"}} onError={e=>e.target.style.display="none"}/>
              <span style={{color:"#c9d1d9",fontSize:12,fontWeight:600}}>
                {_isHome ? `${_opp} @ ${abbr}` : `${abbr} @ ${_opp}`}
              </span>
            </div>
          );
          if (tp.sport === "mlb") {
            const sc = tp.totalSimScore;
            const scColor = sc >= 8 ? "#3fb950" : sc >= 5 ? "#e3b341" : "#8b949e";
            const hERA = tp.homeERA ?? null, aERA = tp.awayERA ?? null;
            const hRPG = tp.homeRPG ?? null, aRPG = tp.awayRPG ?? null;
            const pf = tp.parkFactor ?? 1;
            const et = tp.expectedTotal ?? null;
            const eraColor = v => v == null ? "#8b949e" : v > 4.5 ? "#3fb950" : v > 3.5 ? "#e3b341" : "#f78166";
            const rpgColor = v => v == null ? "#8b949e" : v > 5.0 ? "#3fb950" : v > 4.0 ? "#e3b341" : "#8b949e";
            const etColor = et == null ? "#8b949e" : et >= tp.threshold + 0.5 ? "#3fb950" : et >= tp.threshold - 0.5 ? "#e3b341" : "#8b949e";
            const hERAPts = hERA != null ? (hERA > 4.5 ? 3 : hERA > 3.5 ? 2 : 1) : 0;
            const aERAPts = aERA != null ? (aERA > 4.5 ? 3 : aERA > 3.5 ? 2 : 1) : 0;
            const hRPGPts = hRPG != null ? (hRPG > 5.0 ? 2 : hRPG > 4.0 ? 1 : 0) : 0;
            const aRPGPts = aRPG != null ? (aRPG > 5.0 ? 2 : aRPG > 4.0 ? 1 : 0) : 0;
            const gameOuLine = tp.gameOuLine ?? null;
            const mlbOuPts = tp.mlbOuPts ?? 1;
            const ouColor = gameOuLine == null ? "#8b949e" : gameOuLine >= 9.5 ? "#3fb950" : gameOuLine >= 7.5 ? "#e3b341" : "#f78166";
            const ouDesc = gameOuLine == null ? null : gameOuLine >= 9.5 ? "a high-scoring game, supports the over" : gameOuLine >= 7.5 ? "an average total" : "a low total — market doesn't expect high scoring";
            const scTitle = [`${tp.homeTeam} ERA (${hERA != null ? hERA.toFixed(2) : "—"}): ${hERA != null ? (hERA > 4.5 ? 2 : hERA > 3.5 ? 1 : 0) : 1}/2`,`${tp.awayTeam} ERA (${aERA != null ? aERA.toFixed(2) : "—"}): ${aERA != null ? (aERA > 4.5 ? 2 : aERA > 3.5 ? 1 : 0) : 1}/2`,`${tp.homeTeam} RPG (${hRPG != null ? hRPG.toFixed(1) : "—"}): ${hRPG != null ? (hRPG > 5.0 ? 2 : hRPG > 4.0 ? 1 : 0) : 1}/2`,`${tp.awayTeam} RPG (${aRPG != null ? aRPG.toFixed(1) : "—"}): ${aRPG != null ? (aRPG > 5.0 ? 2 : aRPG > 4.0 ? 1 : 0) : 1}/2`,`O/U (${gameOuLine != null ? gameOuLine : "—"}): ${mlbOuPts}/2`].join("\n");
            return (
              <div style={{background:"#0d1117",border:"1px solid #21262d",borderRadius:8,padding:"8px 10px",fontSize:11,color:"#8b949e",lineHeight:1.65,marginBottom:14}}>
                {matchupHeader}
                <span style={{color:"#c9d1d9"}}>{tp.awayTeam}</span>'s starter has{aERA != null ? <> a <span style={{color:eraColor(aERA),fontWeight:600}}>{aERA.toFixed(2)} ERA</span></> : " — ERA"}, facing a <span style={{color:"#c9d1d9"}}>{tp.homeTeam}</span> offense averaging{hRPG != null ? <> <span style={{color:rpgColor(hRPG),fontWeight:600}}>{hRPG.toFixed(1)}</span> runs/game</> : " — RPG"}.
                {" "}<span style={{color:"#c9d1d9"}}>{tp.homeTeam}</span>'s starter posts{hERA != null ? <> a <span style={{color:eraColor(hERA),fontWeight:600}}>{hERA.toFixed(2)} ERA</span></> : " — ERA"} against a <span style={{color:"#c9d1d9"}}>{tp.awayTeam}</span> offense at{aRPG != null ? <> <span style={{color:rpgColor(aRPG),fontWeight:600}}>{aRPG.toFixed(1)}</span> RPG</> : " — RPG"}.
                {Math.abs(pf - 1) > 0.01 && <>{" "}Tonight's park {pf > 1 ? "inflates run scoring" : "suppresses run scoring"} (<span style={{color:"#8b949e"}}>{pf > 1 ? "+" : ""}{((pf-1)*100).toFixed(0)}%</span>).</>}
                {gameOuLine != null && <>{" "}Game total <span style={{color:ouColor,fontWeight:600}}>{gameOuLine}</span><span style={{color:"#8b949e"}}> — {ouDesc}.</span></>}
                {et != null && <>{" "}Model projects <span style={{color:etColor,fontWeight:600}}>{et}</span> combined runs.</>}
                {" "}<span title={scTitle} style={{background:"#161b22",borderRadius:4,padding:"1px 5px",color:scColor,fontWeight:700,fontSize:10,verticalAlign:"middle",cursor:"default"}}>{sc}/10 {sc>=8?"Alpha":sc>=5?"Mid":"Low"}</span>
              </div>
            );
          }
          if (tp.sport === "nba") {
            const sc = tp.totalSimScore;
            const scColor = sc >= 8 ? "#3fb950" : sc >= 5 ? "#e3b341" : "#8b949e";
            const hOff = tp.homeOff ?? null, aOff = tp.awayOff ?? null;
            const hDef = tp.homeDef ?? null, aDef = tp.awayDef ?? null;
            const hPace = tp.homePace ?? null, aPace = tp.awayPace ?? null;
            const lgPace = tp.leagueAvgPace ?? null;
            const et = tp.expectedTotal ?? null;
            const paceAdj = (hPace != null && aPace != null && lgPace != null) ? parseFloat(((hPace + aPace) / 2 - lgPace).toFixed(1)) : null;
            const offColor = v => v == null ? "#8b949e" : v >= 118 ? "#f78166" : v >= 113 ? "#e3b341" : "#8b949e";
            const defColor = v => v == null ? "#8b949e" : v >= 118 ? "#3fb950" : v >= 113 ? "#e3b341" : "#f78166";
            const paceColor = paceAdj == null ? "#8b949e" : paceAdj > 0 ? "#3fb950" : paceAdj > -2 ? "#e3b341" : "#8b949e";
            const etColor = et == null ? "#8b949e" : et >= tp.threshold + 2 ? "#3fb950" : et >= tp.threshold - 2 ? "#e3b341" : "#8b949e";
            const nbaOuLine = tp.gameOuLine ?? null; const nbaOuPts = nbaOuLine == null ? 1 : nbaOuLine >= 235 ? 2 : nbaOuLine >= 225 ? 1 : 0;
            const scTitle = [`${tp.homeTeam} off PPG (${hOff != null ? hOff.toFixed(0) : "—"}): ${hOff != null ? (hOff >= 118 ? 2 : hOff >= 113 ? 1 : 0) : 1}/2`,`${tp.awayTeam} off PPG (${aOff != null ? aOff.toFixed(0) : "—"}): ${aOff != null ? (aOff >= 118 ? 2 : aOff >= 113 ? 1 : 0) : 1}/2`,`${tp.homeTeam} def allowed (${hDef != null ? hDef.toFixed(0) : "—"}): ${hDef != null ? (hDef >= 118 ? 2 : hDef >= 113 ? 1 : 0) : 1}/2`,`${tp.awayTeam} def allowed (${aDef != null ? aDef.toFixed(0) : "—"}): ${aDef != null ? (aDef >= 118 ? 2 : aDef >= 113 ? 1 : 0) : 1}/2`,`O/U (${nbaOuLine ?? "—"}): ${nbaOuPts}/2`].join("\n");
            return (
              <div style={{background:"#0d1117",border:"1px solid #21262d",borderRadius:8,padding:"8px 10px",fontSize:11,color:"#8b949e",lineHeight:1.65,marginBottom:14}}>
                {matchupHeader}
                <span style={{color:"#c9d1d9"}}>{tp.awayTeam}</span> averages{aOff != null ? <> <span style={{color:offColor(aOff),fontWeight:600}}>{aOff.toFixed(0)} PPG</span></> : " —"} facing a <span style={{color:"#c9d1d9"}}>{tp.homeTeam}</span> defense allowing{hDef != null ? <> <span style={{color:defColor(hDef),fontWeight:600}}>{hDef.toFixed(0)} PPG</span></> : " —"}.
                {" "}<span style={{color:"#c9d1d9"}}>{tp.homeTeam}</span> averages{hOff != null ? <> <span style={{color:offColor(hOff),fontWeight:600}}>{hOff.toFixed(0)} PPG</span></> : " —"} facing a <span style={{color:"#c9d1d9"}}>{tp.awayTeam}</span> defense allowing{aDef != null ? <> <span style={{color:defColor(aDef),fontWeight:600}}>{aDef.toFixed(0)} PPG</span></> : " —"}.
                {paceAdj != null && <>{" "}Game pace is <span style={{color:paceColor,fontWeight:600}}>{paceAdj > 0 ? "+" : ""}{paceAdj}</span> vs league avg{paceAdj > 0 ? " — more possessions, more scoring" : paceAdj > -2 ? " — near league average" : " — slower game, fewer possessions"}.</>}
                {et != null && <>{" "}Model projects <span style={{color:etColor,fontWeight:600}}>{et}</span> combined pts.</>}
                {" "}<span title={scTitle} style={{background:"#161b22",borderRadius:4,padding:"1px 5px",color:scColor,fontWeight:700,fontSize:10,verticalAlign:"middle",cursor:"default"}}>{sc}/10 {sc>=8?"Alpha":sc>=5?"Mid":"Low"}</span>
              </div>
            );
          }
          if (tp.sport === "nhl") {
            const sc = tp.totalSimScore;
            const scColor = sc >= 8 ? "#3fb950" : sc >= 5 ? "#e3b341" : "#8b949e";
            const hGPG = tp.homeGPG ?? null, aGPG = tp.awayGPG ?? null;
            const hGAA = tp.homeGAA ?? null, aGAA = tp.awayGAA ?? null;
            const et = tp.expectedTotal ?? null;
            const gpgColor = v => v == null ? "#8b949e" : v >= 3.5 ? "#3fb950" : v >= 3.0 ? "#e3b341" : "#8b949e";
            const gaaColor = v => v == null ? "#8b949e" : v >= 3.5 ? "#3fb950" : v >= 3.0 ? "#e3b341" : "#8b949e";
            const etColor = et == null ? "#8b949e" : et >= tp.threshold + 0.5 ? "#3fb950" : et >= tp.threshold - 0.5 ? "#e3b341" : "#8b949e";
            const _gpgPts = v => v == null ? 1 : v >= 3.5 ? 2 : v >= 3.0 ? 1 : 0;
            const _gaaPts = v => v == null ? 1 : v >= 3.5 ? 2 : v >= 3.0 ? 1 : 0;
            const nhlOuLine = tp.gameOuLine ?? null; const nhlOuPts = nhlOuLine == null ? 1 : nhlOuLine >= 7 ? 2 : nhlOuLine >= 5.5 ? 1 : 0;
            const scTitle = [`${tp.homeTeam} GPG (${hGPG ?? "—"}): ${_gpgPts(hGPG)}/2`,`${tp.awayTeam} GPG (${aGPG ?? "—"}): ${_gpgPts(aGPG)}/2`,`${tp.homeTeam} GAA (${hGAA ?? "—"}): ${_gaaPts(hGAA)}/2`,`${tp.awayTeam} GAA (${aGAA ?? "—"}): ${_gaaPts(aGAA)}/2`,`O/U (${nhlOuLine ?? "—"}): ${nhlOuPts}/2`].join("\n");
            return (
              <div style={{background:"#0d1117",border:"1px solid #21262d",borderRadius:8,padding:"8px 10px",fontSize:11,color:"#8b949e",lineHeight:1.65,marginBottom:14}}>
                {matchupHeader}
                <span style={{color:"#c9d1d9"}}>{tp.awayTeam}</span> averages{aGPG != null ? <> <span style={{color:gpgColor(aGPG),fontWeight:600}}>{aGPG.toFixed(1)} GPG</span></> : " —"} facing a <span style={{color:"#c9d1d9"}}>{tp.homeTeam}</span> defense with{hGAA != null ? <> <span style={{color:gaaColor(hGAA),fontWeight:600}}>{hGAA.toFixed(2)} GAA</span></> : " — GAA"}.
                {" "}<span style={{color:"#c9d1d9"}}>{tp.homeTeam}</span> averages{hGPG != null ? <> <span style={{color:gpgColor(hGPG),fontWeight:600}}>{hGPG.toFixed(1)} GPG</span></> : " —"} facing a <span style={{color:"#c9d1d9"}}>{tp.awayTeam}</span> defense allowing{aGAA != null ? <> <span style={{color:gaaColor(aGAA),fontWeight:600}}>{aGAA.toFixed(2)} GAA</span></> : " — GAA"}.
                {et != null && <>{" "}Model projects <span style={{color:etColor,fontWeight:600}}>{et}</span> combined goals.</>}
                {" "}<span title={scTitle} style={{background:"#161b22",borderRadius:4,padding:"1px 5px",color:scColor,fontWeight:700,fontSize:10,verticalAlign:"middle",cursor:"default"}}>{sc}/10 {sc>=8?"Alpha":sc>=5?"Mid":"Low"}</span>
              </div>
            );
          }
          return null;
        })()}

        {/* Totals bar chart */}
        <TotalsBarChart gameLog={gameLog} sport={sport}
          tonightTotalMap={tonightTotalMap} tonightPlay={tonightPlay}
          trackedPlays={trackedPlays} onTrack={trackPlay} onUntrack={untrackPlay}/>

        {/* Lineup — shown above game log when available */}
        {lineup.length > 0 && (() => {
          // Build a map of playerName → qualifying plays for inline play cards
          const allPlays = allTonightPlays || tonightPlays || [];
          const playerPlaysMap = {};
          allPlays.forEach(pl => {
            if (pl.gameType === "total") return;
            const key = pl.playerName;
            if (!playerPlaysMap[key]) playerPlaysMap[key] = [];
            playerPlaysMap[key].push(pl);
          });

          // Render a compact inline play card row
          const MiniPlayCard = ({ play }) => {
            const tc = tierColor(play.truePct);
            const tp = play.truePct;
            const trueOdds = tp != null ? (tp >= 100 ? -99999 : tp >= 50 ? Math.round(-(tp/(100-tp))*100) : Math.round((100-tp)/tp*100)) : null;
            const trueOddsStr = trueOdds != null ? (trueOdds > 0 ? `+${trueOdds}` : `${trueOdds}`) : null;
            const kp = play.kalshiPct;
            const kOdds = play.americanOdds;
            const kOddsStr = kOdds != null ? (kOdds > 0 ? `+${kOdds}` : `${kOdds}`) : null;
            const isQual = play.qualified !== false;
            return (
              <div style={{marginTop:6,background:"#161b22",border:`1px solid ${isQual?"#30363d":"#21262d"}`,borderRadius:8,padding:"8px 10px"}}>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
                  <span style={{background:"rgba(88,166,255,0.12)",border:"1px solid #58a6ff",
                    borderRadius:5,padding:"1px 7px",fontSize:11,color:"#58a6ff",fontWeight:700,whiteSpace:"nowrap"}}>
                    {play.threshold}+ {STAT_LABEL[play.stat] || play.stat}
                  </span>
                  {isQual && play.edge != null && (
                    <span style={{background:"rgba(63,185,80,0.13)",border:"1px solid #3fb950",
                      borderRadius:5,padding:"1px 7px",fontSize:11,color:"#3fb950",fontWeight:700,whiteSpace:"nowrap"}}>
                      +{play.edge}%
                    </span>
                  )}
                  {!isQual && <span style={{fontSize:10,color:"#484f58"}}>unqualified</span>}
                </div>
                {/* True% bar */}
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                  <div style={{flex:1,background:"#21262d",borderRadius:3,height:10,overflow:"hidden"}}>
                    <div style={{width:`${tp}%`,background:tc,height:"100%",borderRadius:3,minWidth:tp>0?2:0}}/>
                  </div>
                  <div style={{width:80,flexShrink:0,display:"flex",justifyContent:"flex-end",alignItems:"baseline",gap:3}}>
                    <span style={{color:tc,fontSize:11,fontWeight:700}}>{tp}%</span>
                    {trueOddsStr && <span style={{color:tc,fontSize:10}}>({trueOddsStr})</span>}
                  </div>
                </div>
                {/* Kalshi bar */}
                {kp != null && (
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <div style={{flex:1,background:"#21262d",borderRadius:3,height:8,overflow:"hidden"}}>
                      <div style={{width:`${kp}%`,background:"#6e40c9",height:"100%",borderRadius:3,minWidth:kp>0?2:0}}/>
                    </div>
                    <div style={{width:80,flexShrink:0,display:"flex",justifyContent:"flex-end",alignItems:"baseline",gap:3}}>
                      <span style={{color:"#6e40c9",fontSize:11,fontWeight:600}}>{kp}%</span>
                      {kOddsStr && <span style={{color:"#6e40c9",fontSize:10}}>({kOddsStr})</span>}
                    </div>
                  </div>
                )}
              </div>
            );
          };

          const renderLineupRow = ({ key, posLabel, posStyle, imgSrc, name, subLabel, subStyle, rowStyle, isProb }) => {
            const plays = playerPlaysMap[name] || [];
            // Sort: qualified first, then by threshold ascending
            const sortedPlays = [...plays].sort((a,b) => {
              if ((a.qualified !== false) !== (b.qualified !== false)) return (a.qualified !== false) ? -1 : 1;
              return (a.threshold||0) - (b.threshold||0);
            });
            const hasPlays = sortedPlays.length > 0;
            const refPlay = sortedPlays[0];
            const sportKey = sport === "mlb" ? "baseball/mlb" : sport === "nba" ? "basketball/nba" : "hockey/nhl";
            const SPORT_KEY_MAP = { mlb:"baseball/mlb", nba:"basketball/nba", nhl:"hockey/nhl" };
            const playerObj = refPlay
              ? { id: refPlay.playerId, name, team: refPlay.playerTeam, sportKey: SPORT_KEY_MAP[refPlay.sport] || sportKey,
                  opponent: refPlay.opponent, oppRank: refPlay.oppRank, oppMetricValue: refPlay.oppMetricValue,
                  oppMetricLabel: refPlay.oppMetricLabel, oppMetricUnit: refPlay.oppMetricUnit,
                  playSport: refPlay.sport, playThreshold: refPlay.threshold, playStat: refPlay.stat }
              : { name, sportKey };
            return (
              <div key={key} style={{...rowStyle, flexDirection:"column", alignItems:"stretch", cursor: navigateToPlayer ? "pointer" : "default"}}
                onClick={() => navigateToPlayer && navigateToPlayer(playerObj, refPlay?.stat || null)}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{...posStyle,flexShrink:0}}>{posLabel}</span>
                  <img src={imgSrc} alt={name} style={{width:32,height:32,borderRadius:8,objectFit:"cover",objectPosition:"top",background:"#21262d",flexShrink:0}}
                    onError={e=>e.target.style.visibility="hidden"}/>
                  <span style={{color:"#c9d1d9",fontSize:13,flex:1,fontWeight: hasPlays ? 600 : 400}}>{name}</span>
                  {subLabel && <span style={subStyle}>{subLabel}</span>}
                  {navigateToPlayer && <span style={{color:"#484f58",fontSize:11,flexShrink:0}}>›</span>}
                </div>
                {sortedPlays.map((pl, i) => (
                  <div key={i} onClick={e => e.stopPropagation()}>
                    <MiniPlayCard play={pl}/>
                  </div>
                ))}
              </div>
            );
          };

          return (
            <div style={{marginTop:22}}>
              {!lineupConfirmed && (
                <div style={{color:"#e3b341",fontSize:11,marginBottom:10,padding:"5px 10px",
                  background:"rgba(227,179,65,0.08)",borderRadius:6,border:"1px solid rgba(227,179,65,0.2)"}}>
                  Depth chart order — today's lineup not yet confirmed
                </div>
              )}
              {sport === "nba" && (
                <div style={{display:"flex",flexDirection:"column",gap:3}}>
                  {lineup.map(p => renderLineupRow({
                    key: p.position,
                    posLabel: p.position,
                    posStyle: {color:"#58a6ff",fontSize:11,fontWeight:700,width:32},
                    imgSrc: `https://a.espncdn.com/i/headshots/nba/players/full/${p.playerId}.png`,
                    name: p.name,
                    subLabel: null,
                    subStyle: {},
                    rowStyle: {display:"flex",background:"#0d1117",border:"1px solid #21262d",borderRadius:8,padding:"8px 12px"},
                  }))}
                </div>
              )}
              {sport === "mlb" && (
                <div style={{display:"flex",flexDirection:"column",gap:3}}>
                  {lineup.filter(p => !p.isProbable).map((p, i) => renderLineupRow({
                    key: p.spot ?? p.playerId ?? i,
                    posLabel: p.spot,
                    posStyle: {color:"#58a6ff",fontSize:11,fontWeight:700,width:24,textAlign:"right"},
                    imgSrc: `https://img.mlbstatic.com/mlb-photos/image/upload/d_people:generic:headshot:67:current.png/w_213,q_auto:best/v1/people/${p.playerId}/headshot/67/current`,
                    name: p.name,
                    subLabel: p.position,
                    subStyle: {color:"#484f58",fontSize:11},
                    rowStyle: {display:"flex",background:"#0d1117",border:"1px solid #21262d",borderRadius:8,padding:"8px 12px"},
                  }))}
                  {lineup.filter(p => p.isProbable).map(p => renderLineupRow({
                    key: "sp",
                    posLabel: "SP",
                    posStyle: {color:"#58a6ff",fontSize:11,fontWeight:700,width:24,textAlign:"right"},
                    imgSrc: `https://img.mlbstatic.com/mlb-photos/image/upload/d_people:generic:headshot:67:current.png/w_213,q_auto:best/v1/people/${p.playerId}/headshot/67/current`,
                    name: p.name,
                    subLabel: "probable",
                    subStyle: {color:"#484f58",fontSize:10},
                    rowStyle: {display:"flex",marginTop:6,background:"rgba(88,166,255,0.06)",border:"1px solid rgba(88,166,255,0.2)",borderRadius:8,padding:"8px 12px"},
                    isProb: true,
                  }))}
                </div>
              )}
            </div>
          );
        })()}

        {/* Game log table */}
        <div style={{marginTop:22,overflowX:"auto"}}>
          <div style={{color:"#484f58",fontSize:10,marginBottom:6}}>Game Log — 2025-26</div>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead>
              <tr>
                {glCols.map(c => (
                  <th key={c.key} onClick={() => toggleSort(c.key)} style={thStyle(c.key)}>
                    {c.label}{glSort.col===c.key?(glSort.dir==="desc"?"↓":"↑"):""}
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {sortedGL.map((g, i) => {
                const isW = g.result === "W";
                return (
                  <tr key={`${g.date}-${i}`} style={{
                    borderTop:"1px solid #21262d",
                    background: i%2===0?"#0d1117":"transparent"}}>
                    <td style={{padding:"5px 8px",color:"#8b949e",textAlign:"left"}}>{g.date ? g.date.slice(5) : "—"}</td>
                    <td style={{padding:"5px 8px",color:"#484f58",textAlign:"center"}}>{g.isHome ? "" : "@"}</td>
                    <td style={{padding:"5px 8px",color:"#c9d1d9",textAlign:"left"}}>
                      <button onClick={() => navigateToTeam(g.opp, sport)}
                        style={{background:"none",border:"none",color:"#c9d1d9",cursor:"pointer",padding:0,fontSize:12,textDecoration:"underline",textDecorationColor:"#484f58"}}>
                        {g.opp}
                      </button>
                    </td>
                    <td style={{padding:"5px 8px",textAlign:"right",color:"#c9d1d9",fontWeight:600}}>{g.teamScore}</td>
                    <td style={{padding:"5px 8px",textAlign:"right",color:"#8b949e"}}>{g.oppScore}</td>
                    <td style={{padding:"5px 8px",textAlign:"right",color:
                      tonightPlay && g.total >= tonightPlay.threshold ? "#3fb950" :
                      tonightPlay && g.total < tonightPlay.threshold ? "#f78166" : "#c9d1d9",
                      fontWeight:600}}>{g.total}</td>
                    <td style={{padding:"5px 8px",textAlign:"right",color:isW?"#3fb950":"#f78166",fontWeight:700}}>
                      {g.result || "—"}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>

      </div>
    </div>
  );
}

const STAT_CONFIGS = {

function DayBar({ day, HALF, maxAbs }) {
  const [hovered, setHovered] = React.useState(false);
  const winH = day.wins > 0 ? Math.max(Math.round((day.wins / maxAbs) * HALF), 3) : 0;
  const lossH = day.losses > 0 ? Math.max(Math.round((day.losses / maxAbs) * HALF), 3) : 0;
  return (
    <div style={{flex:1, position:"relative", cursor:"default"}}
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => setHovered(false)}>
      {winH > 0 && (
        <div style={{
          position:"absolute", left:0, right:0, height:winH,
          top: HALF - winH,
          background: "#3fb950",
          borderRadius: "3px 3px 0 0",
          opacity: hovered ? 1 : 0.85, transition:"opacity 0.15s",
        }}/>
      )}
      {lossH > 0 && (
        <div style={{
          position:"absolute", left:0, right:0, height:lossH,
          top: HALF,
          background: "#f78166",
          borderRadius: "0 0 3px 3px",
          opacity: hovered ? 1 : 0.85, transition:"opacity 0.15s",
        }}/>
      )}
      {hovered && (
        <div style={{
          position:"absolute", bottom: HALF + 8, left:"50%", transform:"translateX(-50%)",
          background:"#1c2128", border:"1px solid #30363d", borderRadius:6,
          padding:"6px 8px", zIndex:100, whiteSpace:"nowrap", pointerEvents:"none",
          fontSize:10, color:"#c9d1d9", minWidth:130,
        }}>
          <div style={{fontWeight:600, marginBottom:4, color:"#8b949e"}}>{day.dateLabel}</div>
          {day.plays.map((p, i) => (
            <div key={i} style={{display:"flex", justifyContent:"space-between", gap:12}}>
              <span>{p.barLabel}</span>
              <span style={{color: p.pl >= 0 ? "#3fb950" : "#f78166", fontWeight:600}}>
                {p.pl >= 0 ? "+" : ""}${p.pl.toFixed(2)}
              </span>
            </div>
          ))}
          {day.plays.length > 1 && (
            <div style={{marginTop:4, paddingTop:4, borderTop:"1px solid #30363d", display:"flex", justifyContent:"space-between"}}>
              <span style={{color:"#484f58"}}>Net</span>
              <span style={{color: day.pl >= 0 ? "#3fb950" : "#f78166", fontWeight:700}}>
                {day.pl >= 0 ? "+" : ""}${day.pl.toFixed(2)}
              </span>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function useDebounce(val, ms) {
  const [dv, setDv] = React.useState(val);
  React.useEffect(() => {
    const t = setTimeout(() => setDv(val), ms);
    return () => clearTimeout(t);
  }, [val, ms]);
  return dv;
}

function AddPickModal({ onClose, onAdd, initialOdds = "-110" }) {
  const SPORT_STATS = {
    nba: ["points","rebounds","assists","threePointers"],
    mlb: ["hits","hrr","strikeouts"],
    nfl: ["passingYards","rushingYards","receivingYards","receptions","completions","attempts"],
    nhl: ["points"],
  };
  const STAT_LABELS = {
    points:"Points", rebounds:"Rebounds", assists:"Assists", threePointers:"3-Pointers",
    hits:"Hits", hrr:"H+R+RBI", strikeouts:"Strikeouts",
    passingYards:"Pass Yards", rushingYards:"Rush Yards", receivingYards:"Rec Yards",
    receptions:"Receptions", completions:"Completions", attempts:"Attempts",
    shotsOnGoal:"Shots on Goal", points:"Points", saves:"Saves",
  };
  const suggestUnits = (odds) => { const o = parseInt(odds) || 0; return o <= -900 ? 5 : o <= -400 ? 4 : o <= -200 ? 3 : o <= -110 ? 2 : 1; };
  const [form, setForm] = React.useState({ playerName:"", sport:"nba", stat:"points", threshold:"", americanOdds:initialOdds, truePct:"", units: String(suggestUnits(initialOdds)), gameDate: new Date().toISOString().slice(0,10) });
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  // Reset stat when sport changes
  React.useEffect(() => {
    set("stat", SPORT_STATS[form.sport][0]);
  }, [form.sport]);

  function handleSubmit(e) {
    e.preventDefault();
    const threshold = parseFloat(form.threshold);
    const americanOdds = parseInt(form.americanOdds);
    if (!form.playerName.trim() || isNaN(threshold) || isNaN(americanOdds)) return;
    const sportFull = { nba:"basketball/nba", mlb:"baseball/mlb", nfl:"football/nfl", nhl:"hockey/nhl" }[form.sport];
    const truePctVal = parseFloat(form.truePct);
    const kalshiPct = americanOdds < 0
      ? Math.abs(americanOdds) / (Math.abs(americanOdds) + 100) * 100
      : 100 / (americanOdds + 100) * 100;
    onAdd({
      playerName: form.playerName.trim(),
      sport: form.sport,
      sportKey: sportFull,
      stat: form.stat,
      threshold,
      americanOdds,
      kalshiPct: parseFloat(kalshiPct.toFixed(1)),
      truePct: !isNaN(truePctVal) ? truePctVal : null,
      edge: !isNaN(truePctVal) ? parseFloat((truePctVal - kalshiPct).toFixed(1)) : null,
      units: parseFloat(form.units) || 1,
      gameDate: form.gameDate || new Date().toISOString().slice(0,10),
    });
    onClose();
  }

  const inp = { background:"#0d1117", border:"1px solid #30363d", borderRadius:6, color:"#c9d1d9",
    fontSize:13, padding:"7px 10px", width:"100%", outline:"none" };
  const lbl = { color:"#8b949e", fontSize:11, marginBottom:4, display:"block" };

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}
      onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div style={{background:"#161b22",border:"1px solid #30363d",borderRadius:12,padding:24,width:"100%",maxWidth:380}}>
        <div style={{display:"flex",alignItems:"center",marginBottom:20}}>
          <span style={{color:"#fff",fontSize:16,fontWeight:700,flex:1}}>Add Pick</span>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#484f58",fontSize:18,cursor:"pointer",lineHeight:1}}>✕</button>
        </div>
        <form onSubmit={handleSubmit}>
          <div style={{display:"grid",gap:14}}>
            <div>
              <label style={lbl}>Player Name</label>
              <input style={inp} placeholder="e.g. Nikola Jokic" value={form.playerName}
                onChange={e => set("playerName", e.target.value)} autoFocus />
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <div>
                <label style={lbl}>Sport</label>
                <select style={inp} value={form.sport} onChange={e => set("sport", e.target.value)}>
                  <option value="nba">NBA</option>
                  <option value="mlb">MLB</option>
                  <option value="nfl">NFL</option>
                  <option value="nhl">NHL</option>
                </select>
              </div>
              <div>
                <label style={lbl}>Stat</label>
                <select style={inp} value={form.stat} onChange={e => set("stat", e.target.value)}>
                  {SPORT_STATS[form.sport].map(s => (
                    <option key={s} value={s}>{STAT_LABELS[s] || s}</option>
                  ))}
                </select>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <div>
                <label style={lbl}>Line (Over)</label>
                <input style={inp} type="number" placeholder="20.5" step="0.5" value={form.threshold}
                  onChange={e => set("threshold", e.target.value)} />
              </div>
              <div>
                <label style={lbl}>Odds</label>
                <input style={inp} type="number" placeholder="-110" value={form.americanOdds}
                  onChange={e => { set("americanOdds", e.target.value); setForm(f => ({ ...f, americanOdds: e.target.value, units: String(suggestUnits(e.target.value)) })); }} />
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
              <div>
                <label style={lbl}>True Probability %</label>
                <input style={inp} type="number" placeholder="75" min="0" max="100" step="0.1" value={form.truePct}
                  onChange={e => set("truePct", e.target.value)} />
              </div>
              <div>
                <label style={lbl}>Units %</label>
                <input style={inp} type="number" placeholder="1" min="0" max="100" step="0.5" value={form.units}
                  onChange={e => set("units", e.target.value)} />
              </div>
              <div>
                <label style={lbl}>Game Date</label>
                <input style={inp} type="date" value={form.gameDate}
                  onChange={e => set("gameDate", e.target.value)} />
              </div>
            </div>
          </div>
          <button type="submit" style={{marginTop:20,width:"100%",padding:"10px",borderRadius:8,
            background:"#238636",border:"none",color:"#fff",fontSize:14,fontWeight:600,cursor:"pointer"}}>
            Add Pick
          </button>
        </form>
      </div>
    </div>
  );
}

function ModelPage({ onBack, calibData, calibLoading, fetchCalib, authToken }) {

  const s = { // shared style helpers

    </div>

  const Formula = ({ children }) => (

      fontFamily:"monospace",fontSize:12,color:"#c9d1d9",lineHeight:1.8,marginBottom:10,whiteSpace:"pre-wrap"}}>
      {children}

  const InputRow = ({ name, color="#c9d1d9", why }) => (
    <div style={{display:"flex",gap:10,marginBottom:6,alignItems:"flex-start"}}>
      <div style={{minWidth:190,flexShrink:0,color:color,fontSize:11,fontWeight:600,paddingTop:1}}>{name}</div>

  );

  const ScoreRow = ({ pts, name, tiers, why }) => (
    <div style={{display:"flex",gap:10,marginBottom:8,alignItems:"flex-start"}}>
      <div style={{minWidth:30,flexShrink:0,color:"#e3b341",fontSize:11,fontWeight:700,paddingTop:1}}>{pts}</div>
      <div style={{flex:1}}>
        <div style={{color:"#c9d1d9",fontSize:11,fontWeight:600,marginBottom:2}}>{name}</div>
        <div style={{color:"#8b949e",fontSize:10,marginBottom:2}}>{tiers}</div>
        <div style={{color:"#484f58",fontSize:10,lineHeight:1.5}}>{why}</div>
      </div>
    </div>
  );

  // Tab → calibration category key(s)
  const TAB_CAT = {
    "mlb-k":   ["mlb|strikeouts"],
    "mlb-hrr": ["mlb|hrr"],
    "nba":     ["nba|points","nba|rebounds","nba|assists","nba|threePointers"],
    "nhl":     ["nhl|points"],
    "mlb-gt":  ["mlb|totalRuns"],
    "nba-gt":  ["nba|totalPoints"],
    "nhl-gt":  ["nhl|totalGoals"],
    "mlb-tt":  ["mlb|teamRuns"],
    "nba-tt":  ["nba|teamPoints"],
  };

  const deltaColor = d => d == null ? "#8b949e" : d >= 3 ? "#3fb950" : d <= -3 ? "#f78166" : "#e3b341";
  const barW = pct => pct != null ? `${Math.min(100, pct)}%` : "0%";
  const thCalib = { padding:"5px 10px", color:"#6e7681", fontSize:11, fontWeight:600, textAlign:"left", borderBottom:"1px solid #21262d", whiteSpace:"nowrap" };
  const tdCalib = { padding:"5px 10px", fontSize:11, borderBottom:"1px solid #161b22" };

  // Aggregate multiple bucket arrays (for NBA tabs covering several stats)
  function mergeBuckets(arrays) {
    const LABELS = ["70-75","75-80","80-85","85-90","90-95","95+"];
    const PREDICTED = [72.5, 77.5, 82.5, 87.5, 92.5, 97.5];
    return LABELS.map((label, i) => {
      let wins = 0, n = 0;
      for (const arr of arrays) {
        const b = arr.find(x => x.bucket === label);
        if (b) { wins += Math.round((b.actual ?? 0) / 100 * b.n); n += b.n; }
      }
      const actual = n > 0 ? parseFloat((wins / n * 100).toFixed(1)) : null;
      return { bucket: label, predicted: PREDICTED[i], actual, n, delta: actual != null ? parseFloat((actual - PREDICTED[i]).toFixed(1)) : null };
    });
  }

  const CalibModule = ({ tabId }) => {
    const cats = TAB_CAT[tabId] || [];
    const isKTab = tabId === "mlb-k";

    if (!authToken) return (
      <div style={{...s.card, marginTop:8}}>
        <div style={{color:"#484f58", fontSize:12}}>Log in to see calibration data for this model.</div>
      </div>
    );
    if (calibLoading) return (
      <div style={{...s.card, marginTop:8}}>
        <div style={{color:"#8b949e", fontSize:12}}>Loading calibration data…</div>
      </div>
    );
    if (!calibData || calibData.error) return (
      <div style={{...s.card, marginTop:8}}>
        <div style={{display:"flex", alignItems:"center", justifyContent:"space-between"}}>
          <div style={{color:"#484f58", fontSize:12}}>{calibData?.error ? `Error: ${calibData.error}` : "Calibration data not yet loaded."}</div>
          <button onClick={fetchCalib} style={{fontSize:11,padding:"3px 10px",borderRadius:6,cursor:"pointer",border:"1px solid #30363d",background:"transparent",color:"#8b949e"}}>Load</button>
        </div>
      </div>
    );

    const { byCategoryDetail, kStrikeouts, finalizedPicks } = calibData;

    // Build bucket rows — merge all cats for this tab
    const catArrays = cats.map(c => byCategoryDetail?.[c]).filter(Boolean);
    const bucketRows = catArrays.length > 0 ? mergeBuckets(catArrays) : [];
    const catTotals = cats.reduce((acc, c) => {
      const d = calibData.byCategory?.[c];
      if (d) { acc.n += d.n; acc.wins += Math.round(d.hitRate / 100 * d.n); }
      return acc;
    }, { n: 0, wins: 0 });
    const catHitRate = catTotals.n > 0 ? (catTotals.wins / catTotals.n * 100).toFixed(1) : null;
    const hasData = catTotals.n > 0;

    return (
      <div style={{...s.card, marginTop:8}}>
        <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:hasData?12:0}}>
          <div style={{display:"flex", alignItems:"center", gap:10}}>
            <span style={{color:"#c9d1d9", fontSize:13, fontWeight:700}}>Calibration</span>
            {hasData && <span style={{background:"#21262d", color:"#8b949e", fontSize:11, borderRadius:10, padding:"1px 8px"}}>{catTotals.n} picks</span>}
            {hasData && catHitRate && (
              <span style={{color: parseFloat(catHitRate)>=70?"#3fb950":parseFloat(catHitRate)>=60?"#e3b341":"#f78166", fontSize:12, fontWeight:600}}>{catHitRate}% hit rate</span>
            )}
          </div>
          <button onClick={fetchCalib} style={{fontSize:11,padding:"3px 10px",borderRadius:6,cursor:"pointer",border:"1px solid #30363d",background:"transparent",color:"#8b949e"}}>↻</button>
        </div>

        {!hasData ? (
          <div style={{color:"#484f58", fontSize:12}}>No finalized picks yet for this category.</div>
        ) : (
          <>
            {/* truePct bucket table */}
            <table style={{width:"100%",borderCollapse:"collapse",background:"#0d1117",borderRadius:8,overflow:"hidden",border:"1px solid #21262d",marginBottom:isKTab?14:0}}>
              <thead><tr>{["Bucket","N","Predicted","Actual","Delta",""].map(h=><th key={h} style={thCalib}>{h}</th>)}</tr></thead>
              <tbody>
                {bucketRows.map(b => (
                  <tr key={b.bucket}>
                    <td style={tdCalib}><span style={{color:"#c9d1d9"}}>{b.bucket}%</span></td>
                    <td style={{...tdCalib, color:b.n<5?"#484f58":b.n<10?"#6e7681":"#c9d1d9"}}>{b.n||"—"}</td>
                    <td style={{...tdCalib, color:"#8b949e"}}>{b.predicted.toFixed(1)}%</td>
                    <td style={{...tdCalib, color:b.actual==null?"#484f58":b.actual>=70?"#3fb950":b.actual>=60?"#e3b341":"#f78166"}}>{b.actual!=null?`${b.actual}%`:"—"}</td>
                    <td style={{...tdCalib, color:deltaColor(b.delta)}}>{b.delta!=null?(b.delta>=0?`+${b.delta}`:b.delta):"—"}</td>
                    <td style={{...tdCalib, width:120}}>
                      {b.actual!=null&&(
                        <div style={{position:"relative",height:7,background:"#21262d",borderRadius:4,overflow:"hidden"}}>
                          <div style={{position:"absolute",left:0,top:0,height:"100%",width:barW(b.actual),background:b.actual>=70?"#3fb950":b.actual>=60?"#e3b341":"#f78166",borderRadius:4}}/>
                          <div style={{position:"absolute",left:`${b.predicted}%`,top:0,height:"100%",width:2,background:"#58a6ff",opacity:0.8}}/>
                        </div>
                      )}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>

            {/* MLB K feature sub-tables */}
            {isKTab && kStrikeouts && kStrikeouts.n > 0 && (
              <div style={{display:"flex", gap:10, flexWrap:"wrap"}}>
                {[
                  { title:"By SimScore", data:kStrikeouts.bySimScore, keyLabel:"Score" },
                  { title:"By K% Tier", data:kStrikeouts.byKpctPts, keyLabel:"Pts" },
                  { title:"By K-Trend", data:kStrikeouts.byKTrendPts, keyLabel:"Pts" },
                  ...(kStrikeouts.byStdBF ? [{ title:"By stdBF", data:kStrikeouts.byStdBF, keyLabel:"BF Var", keyColor: k => k==="low"?"#3fb950":k==="high"?"#f78166":"#8b949e" }] : []),
                ].map(({title,data,keyLabel,keyColor}) => (
                  <div key={title} style={{flex:"1 1 130px",background:"#0d1117",border:"1px solid #21262d",borderRadius:8,overflow:"hidden"}}>
                    <div style={{color:"#8b949e",fontSize:11,fontWeight:600,padding:"5px 10px",borderBottom:"1px solid #21262d"}}>{title}</div>
                    <table style={{width:"100%",borderCollapse:"collapse"}}>
                      <thead><tr>
                        <th style={{...thCalib,padding:"4px 8px"}}>{keyLabel}</th>
                        <th style={{...thCalib,padding:"4px 8px"}}>N</th>
                        <th style={{...thCalib,padding:"4px 8px"}}>Hit%</th>
                      </tr></thead>
                      <tbody>
                        {Object.entries(data).map(([k,d])=>(
                          <tr key={k}>
                            <td style={{...tdCalib,padding:"4px 8px",color:keyColor?keyColor(k):"#c9d1d9"}}>{k}</td>
                            <td style={{...tdCalib,padding:"4px 8px",color:d.n<5?"#6e7681":"#c9d1d9"}}>{d.n}</td>
                            <td style={{...tdCalib,padding:"4px 8px",color:d.hitRate>=70?"#3fb950":d.hitRate>=60?"#e3b341":"#f78166",fontWeight:600}}>{d.hitRate}%</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                ))}
              </div>
            )}
          </>
        )}
      </div>
    );
  };

  const TABS = [
    { id:"mlb-k",    label:"MLB Strikeouts" },
    { id:"mlb-hrr",  label:"MLB H+R+RBI" },
    { id:"nba",      label:"NBA Props" },
    { id:"nhl",      label:"NHL Points" },
    { id:"mlb-gt",   label:"MLB Game Total" },
    { id:"nba-gt",   label:"NBA Game Total" },
    { id:"nhl-gt",   label:"NHL Game Total" },
    { id:"mlb-tt",   label:"MLB Team Total" },
    { id:"nba-tt",   label:"NBA Team Total" },
  ];

  const content = {
    "mlb-k": (
      <>
        <Section title="MLB Strikeouts — True% Model">
          <div style={s.sub}>Computes P(strikeouts ≥ threshold) via Monte Carlo simulation (5k–10k trials based on SimScore)</div>

          <div style={s.h3}>Core Formula</div>
          <Formula>{`For each simulated trial:
  trialPA ~ Normal(avgBF, stdBF)          ← per-trial BF variance, clamped [10,27]
  [blowout hook: ~8–18% chance → trialPA = rand[10,15] based on team ML odds]
  For each batter in trialPA:
    if batter# ≥ 19: pitcherK% × 0.88    ← TTO decay (3rd time through order)
    P(K) = log5(pitcherK%, batterK%)      ← matchup-specific probability
  total Ks = sum of K outcomes across trialPA batters
truePct = fraction of trials where total ≥ threshold`}</Formula>

          <div style={s.h3}>Model Inputs</div>
          <InputRow name="Pitcher K% (regressed)" color="#3fb950"
            why="Core signal. Regressed toward 2025 season anchor (or 22.2% league avg) weighted by 2026 batters faced ÷ 200. Prevents small-sample overfit — a pitcher with 2 starts isn't trusted at face value." />
          <InputRow name="A1 — Recent form (last 5 starts)" color="#3fb950"
            why="Effective K% = 60% recent + 40% season when ≥3 starts and 30+ total BF. Captures momentum: a pitcher in a 3-start hot streak is more predictive for tonight than their full-season average." />
          <InputRow name="A2 — Rest / fatigue" color="#e3b341"
            why="≤3 days rest → K% ×0.96. ≤3 days AND last start ≥95 pitches → ×0.92. Short rest after heavy workload produces measurable decline in swing-and-miss rate." />
          <InputRow name="Batter K% (lineup, hand-adjusted)" color="#3fb950"
            why="Strikeouts require both pitcher and batter. A lineup full of high-K batters amplifies the pitcher. Adjusted for LHP/RHP split since platoon splits are large (batters K more vs same-hand pitchers)." />
          <InputRow name="E3b — Expected BF (empirical avgBF)" color="#e3b341"
            why="Pitcher-specific average batters faced per start, computed from their MLB gamelog (NP≥30 starts only). High-walk or deep-count pitchers face fewer batters than average — this directly lowers the K ceiling. Falls back to avgPitches ÷ 3.85 when gamelog data is absent." />
          <InputRow name="stdBF variance" color="#8b949e"
            why="Each trial samples trialPA from Normal(avgBF, stdBF) rather than using a fixed number. stdBF is the empirical standard deviation of BF across the pitcher's qualified starts (≥3 required). Reflects real pitch-count variability: some nights a pitcher goes 7 deep, others they're pulled after 4. Uses scoped Box-Muller to avoid cross-request state." />
          <InputRow name="TTO decay (inside simulation)" color="#8b949e"
            why="The 3rd time through the order, batters K at ~12% lower rates league-wide as they adjust to the pitcher's tendencies. Applied inside each trial at BF ≥ 19 as ×0.88. Effect: −0.15 to −0.25 projected Ks for workhorses (avgBF ≥ 22); negligible for pitch-limited starters." />
          <InputRow name="Blowout hook (earlyExitProb)" color="#8b949e"
            why="When a pitcher's team is a large underdog (+150 or worse), there's a meaningful chance they get pulled early if the game gets out of hand. ML odds map to early-exit probability: +150→8%, +200→12%, +250+→18%. Each trial independently rolls whether the pitcher is clipped at 10–15 BF." />
          <InputRow name="E3a — Umpire K-factor" color="#e3b341"
            why="Known in advance. Plate umpires vary ~10–15% in strikeout rate (range 0.89–1.12×). Applied directly to pitcherK% before simulation. Unknown umpires → 1.0 (no adjustment)." />
          <InputRow name="Park K-factor" color="#8b949e"
            why="Applied inside simulation. Colorado's thin air reduces spin effectiveness; other parks have structural effects. Built from FanGraphs multi-year SO park factors." />
        </Section>

        <Section title="MLB Strikeouts — SimScore (max 10)">
          <div style={s.sub}>5 components × 2 pts each. Gate: finalSimScore ≥ 8 to qualify as a play.</div>
          <ScoreRow pts="0–2" name="CSW% / K% tier"
            tiers="CSW% ≥30% → 2pts · CSW% >26% → 1pt · ≤26% → 0pts (fallback: K% >27%→2, >24%→1)"
            why="Called Strikes + Whiffs is a better single-start predictor than K% alone because it captures command quality and swing generation. K% can be inflated by opponent quality; CSW is pitcher-intrinsic." />
          <ScoreRow pts="0–2" name="K-BB% (command)"
            tiers=">18% → 2pts · >12% → 1pt · ≤12% → 0pts"
            why="Pitchers who also walk batters have higher variance outcomes. High K-BB means dominant command — strikeouts without the wildness that cuts into BF and pitch count." />
          <ScoreRow pts="0–2" name="Lineup oK% (opponent K-rate)"
            tiers=">24% → 2pts · >22% → 1pt · ≤22% → 0pts"
            why="Facing a high-K lineup increases the probability of each K event. Hand-adjusted (vs RHP or LHP batters). This is the opportunity signal — even the best pitcher needs hitters who swing and miss." />
          <ScoreRow pts="0–2" name="Blended Hit Rate"
            tiers="≥90% → 2pts · ≥80% → 1pt · &lt;80% → 0pts"
            why="Trust-weighted blend of 2026 observed hit rate at this threshold and 2025 computed rate. The pitcher's own historical rate is the strongest calibration signal — if they've hit this K total in 90% of starts, the model's simulation is well-supported." />
          <ScoreRow pts="0–2" name="Game O/U line"
            tiers="≤7.5 → 2pts · &lt;10.5 → 1pt · ≥10.5 → 0pts"
            why="Low totals signal pitcher-dominant conditions. The betting market incorporates weather, ballpark, and other factors we may not have. A consensus O/U ≤7.5 is independent confirmation of a pitchers' duel." />
        </Section>
      </>
    ),
    "mlb-hrr": (
      <>
        <Section title="MLB H+R+RBI — True% Model">

          <Formula>{`truePct = (primaryPct + softPct) / 2 × parkFactor

primaryPct = player's 2026 HRR 1+ rate

softPct = HRR 1+ rate vs tonight's pitcher (H2H, requires ≥5 games)

parkFactor = PARK_HITFACTOR[homeTeam] (park-specific hit multiplier)`}</Formula>

          <div style={s.h3}>Model Inputs</div>
          <InputRow name="2026 HRR rate (primaryPct)" color="#3fb950"

          <InputRow name="H2H vs pitcher (softPct)" color="#3fb950"

          <InputRow name="Team rate fallback (softPct)" color="#e3b341"
            why="When pitcher H2H < 5 games, falls back to batter's rate vs this opponent team. Less precise but preserves the directional signal — does the batter tend to perform against this pitching staff?" />
          <InputRow name="B2 — Recent form (last 10 games)" color="#e3b341"
            why="hitterEffectiveBA = 0.6 × recentBA + 0.4 × seasonBA, fed into simulateHits for the hits component. A batter who's 2-for-30 in their last 10 is genuinely less likely to get a hit tonight regardless of their season average." />
          <InputRow name="Park factor (PARK_HITFACTOR)" color="#8b949e"
            why="Some parks dramatically inflate hits (Coors Field +~15%) or suppress them (Petco Park). Applied as a multiplier on the blended rate." />
        </Section>

        <Section title="MLB H+R+RBI — SimScore (max 10)">
          <div style={s.sub}>5 components × 2 pts each. Gate: hitterFinalSimScore ≥ 8 to qualify.</div>
          <ScoreRow pts="0–2" name="Batter Quality (spot + barrel%)"

          <ScoreRow pts="0–2" name="Pitcher WHIP"

          <ScoreRow pts="0–2" name="Season Hit Rate"
            tiers="≥80% → 2pts · ≥70% → 1pt · &lt;70% → 0pts"
            why="The player's own historical HRR 1+ rate at this threshold, blended 2026/2025. The most direct calibration signal — if a player records HRR in 80%+ of games, the model's output should be in that range." />
          <ScoreRow pts="0–2" name="H2H Hit Rate"
            tiers="≥80% → 2pts · ≥70% → 1pt · &lt;70% → 0pts · &lt;5 games → 1pt abstain"
            why="Rate specifically vs tonight's pitcher from gamelog history (H2H dates only). Highly predictive when sample exists. Sparse H2H (1–4 games) scores 1pt abstain — directional but not reliable enough to reward or penalize." />
          <ScoreRow pts="0–2" name="Game O/U line"
            tiers="≥9.5 → 2pts · ≥7.5 → 1pt · &lt;7.5 → 0pts"
            why="High-scoring game environments increase HRR probability — more runs scored means more R/RBI available. A game with O/U ≥9.5 has consensus expectations of a high-scoring affair." />
        </Section>
      </>
    ),
    "nba": (
      <>
        <Section title="NBA Player Props — True% Model">
          <div style={s.sub}>Normal distribution Monte Carlo (nSim scales 2k–10k based on pre-edge SimScore)</div>

          <div style={s.h3}>Core Formula</div>
          <Formula>{`Build distribution: buildNbaStatDist(gameValues, dvpFactor, paceAdj, isB2B, nSim, miscAdj)

adjustedMean = recentMean × dvpFactor × (1 + paceAdj×0.002) × b2bMult × miscAdj

where:
  recentMean = average of last 10 games (recency)
  fullSeasonStd = standard deviation from full season (stability)
  dvpFactor = leagueAvg / oppDefensiveValue (position-adjusted)
  paceAdj = (oppPace - leagueAvgPace) → more possessions = higher stat
  b2bMult = 0.93 if back-to-back, else 1.0
  miscAdj = C2 × C3 × C4 combined scalar`}</Formula>

          <div style={s.h3}>Model Inputs</div>
          <InputRow name="Last 10 game values (mean)" color="#3fb950"
            why="Recency-weighted mean: a player's last 10 games reflect current role, health, and form better than a season average that includes early-season lineup changes or pre-injury games." />
          <InputRow name="Full season std deviation" color="#3fb950"
            why="Variance is a player trait more stable than mean. Using full season prevents one outlier game from inflating the distribution width." />
          <InputRow name="DVP (Defense vs Position)" color="#3fb950"
            why="Position-adjusted opponent defense. A PG scoring 25 PPG vs a team that allows 28 PPG to PGs (vs 24 league avg) gets a ~17% boost. The most important external factor." />
          <InputRow name="Pace adjustment" color="#e3b341"
            why="More possessions = more opportunities. A 5-possession pace advantage translates to ~1% mean boost. Applied continuously, not binary." />
          <InputRow name="C2 — Injury boost" color="#e3b341"
            why="×1.08 per key opponent player Out (capped 1.15×). Missing defenders increase usage for everyone else — not just the replaced player." />
          <InputRow name="C3 — Blowout risk" color="#e3b341"
            why="max(0.85, 1 − (|spread|−10)×0.007) when |spread|>10. Garbage time = reduced minutes for starters. A 15-point spread reduces expected output ~3.5%." />
          <InputRow name="C4 — Home/Away split" color="#e3b341"
            why="0.7 × homeMean + 0.3 × awayMean (or inverse for road games), vs overall mean. Many players have systematic home/away splits that persist over seasons." />
          <InputRow name="B2B (back-to-back)" color="#8b949e"
            why="×0.93 across the board. Statistically proven ~7% per-game decline on the second night of back-to-backs. Applied to mean before simulation." />
        </Section>

        <Section title="NBA Props — SimScore (max 10)">
          <div style={s.sub}>5 components × 2 pts each. Gate: nbaSimScore ≥ 8.</div>
          <ScoreRow pts="0–2" name="C1 — Opportunity signal"
            tiers="USG% ≥28% → 2pts · ≥22% → 1pt · &lt;22% → 0pts (pts/ast/3pt) | AvgMin ≥30 → 2pts · ≥25 → 1pt (reb)"
            why="Different stats need different opportunity proxies. Usage rate drives points/assists/3-pointers — a player can't rack up stats without the ball. Minutes drives rebounds — floor time is the primary rebounding opportunity." />
          <ScoreRow pts="0–2" name="DVP ratio (pos-adjusted)"
            tiers="ratio ≥1.05 → 2pts · ratio ≥1.02 → 1pt · else 0pts"
            why="Quantifies how much worse the opponent's defense is vs league average at this position. A ratio of 1.10 means the opponent allows 10% more of this stat than average — a meaningful, reproducible edge." />
          <ScoreRow pts="0–2" name="Season Hit Rate"
            tiers="≥90% → 2pts · ≥80% → 1pt · &lt;80% → 0pts"
            why="Player's blended 2026/2025 rate at this threshold. The base rate calibration — if a player hits 25+ points in 90% of games, the model's 87% truePct needs to be at least in that ballpark." />
          <ScoreRow pts="0–2" name="Soft Matchup Hit Rate"
            tiers="≥90% → 2pts · ≥80% → 1pt · &lt;80% → 0pts · null → 1pt abstain"
            why="Hit rate specifically against bottom-tier defenses (similar to tonight's opponent). More comparable to the actual matchup than the overall rate. Null when no soft-team games in sample." />
          <ScoreRow pts="0–2" name="Pace + Game Total"
            tiers="Both favorable (pace>0 AND total ≥225) → 2pts · one → 1pt · neither → 0pts"
            why="Pace and game total are independent corroborating signals. A fast-paced game with a high market O/U means both teams are expected to score — two separate sources of evidence vs one." />
        </Section>
      </>
    ),
    "nhl": (
      <>
        <Section title="NHL Points — True% Model">
          <div style={s.sub}>Normal distribution Monte Carlo (same engine as NBA, adapted for hockey)</div>

          <div style={s.h3}>Core Formula</div>
          <Formula>{`adjustedMean = recentMean × teamDefFactor × toiTrendAdj × b2bMult

where:
  recentMean = average points per game (recent games)
  teamDefFactor = oppGAA / leagueAvgGAA  (higher GAA = softer defense = boost)
  toiTrendAdj = clamp(recent3TOI / last10TOI, 0.92, 1.08)
    applied only when ratio >1.05 (boost) or <0.95 (penalty)
  b2bMult = 0.93 if back-to-back`}</Formula>

          <div style={s.h3}>Model Inputs</div>
          <InputRow name="Per-game point values (mean)" color="#3fb950"
            why="Points (G+A) per game from recent gamelog. NHL scoring is sparse — 0 or 1 is typical — so the distribution is a normal approximation over historical rates." />
          <InputRow name="Opponent GAA (goals-against avg)" color="#3fb950"

          <InputRow name="D3 — TOI trend" color="#e3b341"

          <InputRow name="B2B (back-to-back)" color="#8b949e"
            why="Same logic as NBA. ×0.93 for second-night games. NHL schedule has frequent back-to-backs that produce real fatigue effects." />
        </Section>

        <Section title="NHL Points — SimScore (max 10)">
          <div style={s.sub}>5 components × 2 pts each. Gate: nhlSimScore ≥ 8.</div>
          <ScoreRow pts="0–2" name="Avg TOI (ice time)"
            tiers="≥18 min → 2pts · ≥15 min → 1pt · &lt;15 min → 0pts"
            why="Ice time is the direct opportunity signal in hockey. 18+ minutes means the player is a top-pair/top-line contributor with consistent deployment. Under 15 means limited role — even a great matchup won't help much." />
          <ScoreRow pts="0–2" name="Opponent GAA rank"
            tiers="≤10th worst → 2pts · ≤15th worst → 1pt · else 0pts"
            why="Ranking captures relative weakness vs absolute numbers. A bottom-10 goaltending situation is actionable; middle-of-pack defenses provide little edge." />
          <ScoreRow pts="0–2" name="Season Hit Rate"
            tiers="≥90% → 2pts · ≥80% → 1pt · &lt;80% → 0pts"
            why="Player's career hit rate at this threshold across all games. The base-rate calibration for the simulation output." />
          <ScoreRow pts="0–2" name="DVP Hit Rate (vs soft defenses)"
            tiers="≥90% → 2pts · ≥80% → 1pt · &lt;80% → 0pts · &lt;3 games → 1pt abstain"
            why="Rate specifically in games vs teams with GAA above league average (similar to tonight). Direct analogue to the actual matchup conditions." />
          <ScoreRow pts="0–2" name="Game O/U line"
            tiers="≥7 → 2pts · ≥5.5 → 1pt · &lt;5.5 → 0pts"

        </Section>
      </>
    ),
    "mlb-gt": (
      <>
        <Section title="MLB Game Total — True% Model">
          <div style={s.sub}>Poisson Monte Carlo (10,000 trials). Models each team's run-scoring independently.</div>

          <div style={s.h3}>Core Formula</div>
          <Formula>{`homeLambda = clamp(homeRPG × (awayERA ÷ 4.20) × parkRF, 1, 12)
awayLambda = clamp(awayRPG × (homeERA ÷ 4.20) × parkRF, 1, 12)

Each trial: homeRuns ~ Poisson(homeLambda), awayRuns ~ Poisson(awayLambda)
truePct = fraction of trials where homeRuns + awayRuns ≥ threshold

League avg ERA denominator = 4.20 (normalizes opponent quality to neutral)`}</Formula>

          <ScoreRow pts="0–2" name="Home ERA"
            tiers=">4.5 → 2pts · >3.5 → 1pt · ≤3.5 → 0pts"
            why="High ERA = hittable pitcher = more expected runs for the away team. Two separate ERA inputs (home/away) because each starter independently affects half the scoring." />
          <ScoreRow pts="0–2" name="Away ERA"
            tiers=">4.5 → 2pts · >3.5 → 1pt · ≤3.5 → 0pts"
            why="Same as home ERA — each starter contributes independently to the total scoring environment." />
          <ScoreRow pts="0–2" name="Home RPG"
            tiers=">5.0 → 2pts · >4.0 → 1pt · ≤4.0 → 0pts"
            why="High-scoring offense increases expected total. Two separate RPG inputs because both offenses contribute independently." />
          <ScoreRow pts="0–2" name="Away RPG"
            tiers=">5.0 → 2pts · >4.0 → 1pt · ≤4.0 → 0pts"
            why="Same as home RPG." />
          <ScoreRow pts="0–2" name="Market O/U line"
            tiers="≥9.5 → 2pts · ≥7.5 → 1pt · &lt;7.5 → 0pts"
            why="Independent corroboration from the betting market. High O/U means weather, wind, and lineup factors (not in our model) also favor scoring. Two independent signals agreeing is more reliable than one." />
        </Section>
      </>
    ),
    "nba-gt": (
      <>
        <Section title="NBA Game Total — True% Model">
          <div style={s.sub}>Normal distribution Monte Carlo. Models each team's expected points independently.</div>

          <div style={s.h3}>Core Formula</div>
          <Formula>{`homeExpected = homeOffPPG × (awayDefPPG / leagueAvgDef)
awayExpected = awayOffPPG × (homeDefPPG / leagueAvgDef)
expectedTotal = homeExpected + awayExpected

Distribution: Normal(expectedTotal, combinedStd)
truePct = P(total ≥ threshold)

leagueAvgDef ≈ 114 PPG allowed (regular season, seasontype=2)`}</Formula>

          <div style={s.h3}>Model Inputs</div>
          <InputRow name="Team offensive PPG (homeOffPPG)" color="#3fb950"

          <InputRow name="Opponent defensive PPG allowed" color="#3fb950"
            why="How many points does each team's defense allow per game? A team allowing 120 PPG has worse defense than league average (114), boosting the opponent's expected score." />
          <InputRow name="League avg defensive PPG" color="#8b949e"
            why="Normalization constant. Without this, a 110 PPG offense vs a 120 PPG-allowed defense would be counted differently than the same matchup in a different league-scoring environment." />
        </Section>

        <Section title="NBA Game Total — SimScore (max 10)">
          <div style={s.sub}>5 components × 2 pts each. Gate: totalSimScore ≥ 8. Inverted for UNDER.</div>
          <ScoreRow pts="0–2" name="Home off PPG"
            tiers="≥118 → 2pts · ≥113 → 1pt · else 0pts"
            why="High-scoring offense increases expected total. Both teams contribute independently." />
          <ScoreRow pts="0–2" name="Away off PPG"
            tiers="≥118 → 2pts · ≥113 → 1pt · else 0pts"
            why="Same as home — away team scoring rate contributes equally." />
          <ScoreRow pts="0–2" name="Home def PPG allowed"
            tiers="≥118 → 2pts · ≥113 → 1pt · else 0pts"
            why="Bad defense (allows lots of points) is good for overs. A team allowing 120+ PPG is essentially a free-scoring environment for the opponent." />
          <ScoreRow pts="0–2" name="Away def PPG allowed"
            tiers="≥118 → 2pts · ≥113 → 1pt · else 0pts"
            why="Same logic — away team's defense quality affects home team's expected scoring." />
          <ScoreRow pts="0–2" name="Market O/U line"
            tiers="≥235 → 2pts · ≥225 → 1pt · else 0pts"
            why="Independent market signal. NBA O/U lines near 235+ reflect a consensus expectation of two high-powered offenses or a fast pace. Corroborates the model's expected total calculation." />
        </Section>
      </>
    ),
    "nhl-gt": (
      <>
        <Section title="NHL Game Total — True% Model">
          <div style={s.sub}>Poisson Monte Carlo. Each team's goals modeled as independent Poisson processes.</div>

          <div style={s.h3}>Core Formula</div>
          <Formula>{`homeLambda = clamp(homeGPG × (awayGAA / leagueAvgGAA), 0.5, 8)
awayLambda = clamp(awayGPG × (homeGAA / leagueAvgGAA), 0.5, 8)

Each trial: homeGoals ~ Poisson(homeLambda), awayGoals ~ Poisson(awayLambda)
truePct = fraction of trials where homeGoals + awayGoals ≥ threshold`}</Formula>

          <div style={s.h3}>Model Inputs</div>
          <InputRow name="Team GPG (goals per game)" color="#3fb950"
            why="Offensive baseline. How many goals does this team score against an average goalie?" />
          <InputRow name="Opponent GAA (goals-against avg)" color="#3fb950"
