// Simple localStorage cache to avoid redundant Worker requests
function lsGet(key, ttlMs) {
  try {
    const raw = localStorage.getItem(key);
    if (!raw) return null;
    const { ts, data } = JSON.parse(raw);
    if (Date.now() - ts > ttlMs) return null;
    return data;
  } catch { return null; }
}
function lsSet(key, data) {
  try { localStorage.setItem(key, JSON.stringify({ ts: Date.now(), data })); } catch {}
}

function DayBar({ day, HALF, maxAbs }) {
  const [hovered, setHovered] = React.useState(false);
  const isPos = day.pl >= 0;
  const h = Math.max(Math.round((Math.abs(day.pl) / maxAbs) * HALF), 3);
  return (
    <div style={{flex:1, position:"relative", cursor:"default"}}
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => setHovered(false)}>
      <div style={{
        position:"absolute", left:0, right:0, height:h,
        top: isPos ? HALF - h : HALF,
        background: isPos ? "#3fb950" : "#f78166",
        borderRadius: isPos ? "3px 3px 0 0" : "0 0 3px 3px",
        opacity: hovered ? 1 : 0.85, transition:"opacity 0.15s",
      }}/>
      {hovered && (
        <div style={{
          position:"absolute", bottom: HALF + 8, left:"50%", transform:"translateX(-50%)",
          background:"#1c2128", border:"1px solid #30363d", borderRadius:6,
          padding:"6px 8px", zIndex:100, whiteSpace:"nowrap", pointerEvents:"none",
          fontSize:10, color:"#c9d1d9", minWidth:130,
        }}>
          <div style={{fontWeight:600, marginBottom:4, color:"#8b949e"}}>{day.dateLabel}</div>
          {day.plays.map((p, i) => (
            <div key={i} style={{display:"flex", justifyContent:"space-between", gap:12}}>
              <span>{p.barLabel}</span>
              <span style={{color: p.pl >= 0 ? "#3fb950" : "#f78166", fontWeight:600}}>
                {p.pl >= 0 ? "+" : ""}${p.pl.toFixed(2)}
              </span>
            </div>
          ))}
          {day.plays.length > 1 && (
            <div style={{marginTop:4, paddingTop:4, borderTop:"1px solid #30363d", display:"flex", justifyContent:"space-between"}}>
              <span style={{color:"#484f58"}}>Net</span>
              <span style={{color: day.pl >= 0 ? "#3fb950" : "#f78166", fontWeight:700}}>
                {day.pl >= 0 ? "+" : ""}${day.pl.toFixed(2)}
              </span>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function useDebounce(val, ms) {
  const [dv, setDv] = React.useState(val);
  React.useEffect(() => {
    const t = setTimeout(() => setDv(val), ms);
    return () => clearTimeout(t);
  }, [val, ms]);
  return dv;
}

function AddPickModal({ onClose, onAdd }) {
  const SPORT_STATS = {
    nba: ["points","rebounds","assists","threePointers"],
    mlb: ["hits","homeRuns","hrr","totalBases","strikeouts"],
    nfl: ["passingYards","rushingYards","receivingYards","receptions","completions","attempts"],
    nhl: ["goals","assists","points"],
  };
  const STAT_LABELS = {
    points:"Points", rebounds:"Rebounds", assists:"Assists", threePointers:"3-Pointers",
    hits:"Hits", homeRuns:"Home Runs", hrr:"H+R+RBI", totalBases:"Total Bases", strikeouts:"Strikeouts",
    passingYards:"Pass Yards", rushingYards:"Rush Yards", receivingYards:"Rec Yards",
    receptions:"Receptions", completions:"Completions", attempts:"Attempts",
    shotsOnGoal:"Shots on Goal", points:"Points", saves:"Saves",
  };
  const suggestUnits = (odds) => { const o = parseInt(odds) || 0; return o <= -900 ? 5 : o <= -400 ? 4 : o <= -200 ? 3 : o <= -110 ? 2 : 1; };
  const [form, setForm] = React.useState({ playerName:"", sport:"nba", stat:"points", threshold:"", americanOdds:"-110", truePct:"", units: String(suggestUnits("-110")), gameDate: new Date().toISOString().slice(0,10) });
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  // Reset stat when sport changes
  React.useEffect(() => {
    set("stat", SPORT_STATS[form.sport][0]);
  }, [form.sport]);

  function handleSubmit(e) {
    e.preventDefault();
    const threshold = parseFloat(form.threshold);
    const americanOdds = parseInt(form.americanOdds);
    if (!form.playerName.trim() || isNaN(threshold) || isNaN(americanOdds)) return;
    const sportFull = { nba:"basketball/nba", mlb:"baseball/mlb", nfl:"football/nfl", nhl:"hockey/nhl" }[form.sport];
    const truePctVal = parseFloat(form.truePct);
    const kalshiPct = americanOdds < 0
      ? Math.abs(americanOdds) / (Math.abs(americanOdds) + 100) * 100
      : 100 / (americanOdds + 100) * 100;
    onAdd({
      playerName: form.playerName.trim(),
      sport: form.sport,
      sportKey: sportFull,
      stat: form.stat,
      threshold,
      americanOdds,
      kalshiPct: parseFloat(kalshiPct.toFixed(1)),
      truePct: !isNaN(truePctVal) ? truePctVal : null,
      edge: !isNaN(truePctVal) ? parseFloat((truePctVal - kalshiPct).toFixed(1)) : null,
      units: parseFloat(form.units) || 1,
      gameDate: form.gameDate || new Date().toISOString().slice(0,10),
    });
    onClose();
  }

  const inp = { background:"#0d1117", border:"1px solid #30363d", borderRadius:6, color:"#c9d1d9",
    fontSize:13, padding:"7px 10px", width:"100%", outline:"none" };
  const lbl = { color:"#8b949e", fontSize:11, marginBottom:4, display:"block" };

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}
      onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div style={{background:"#161b22",border:"1px solid #30363d",borderRadius:12,padding:24,width:"100%",maxWidth:380}}>
        <div style={{display:"flex",alignItems:"center",marginBottom:20}}>
          <span style={{color:"#fff",fontSize:16,fontWeight:700,flex:1}}>Add Pick</span>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#484f58",fontSize:18,cursor:"pointer",lineHeight:1}}>✕</button>
        </div>
        <form onSubmit={handleSubmit}>
          <div style={{display:"grid",gap:14}}>
            <div>
              <label style={lbl}>Player Name</label>
              <input style={inp} placeholder="e.g. Nikola Jokic" value={form.playerName}
                onChange={e => set("playerName", e.target.value)} autoFocus />
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <div>
                <label style={lbl}>Sport</label>
                <select style={inp} value={form.sport} onChange={e => set("sport", e.target.value)}>
                  <option value="nba">NBA</option>
                  <option value="mlb">MLB</option>
                  <option value="nfl">NFL</option>
                  <option value="nhl">NHL</option>
                </select>
              </div>
              <div>
                <label style={lbl}>Stat</label>
                <select style={inp} value={form.stat} onChange={e => set("stat", e.target.value)}>
                  {SPORT_STATS[form.sport].map(s => (
                    <option key={s} value={s}>{STAT_LABELS[s] || s}</option>
                  ))}
                </select>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <div>
                <label style={lbl}>Line (Over)</label>
                <input style={inp} type="number" placeholder="20.5" step="0.5" value={form.threshold}
                  onChange={e => set("threshold", e.target.value)} />
              </div>
              <div>
                <label style={lbl}>Odds</label>
                <input style={inp} type="number" placeholder="-110" value={form.americanOdds}
                  onChange={e => { set("americanOdds", e.target.value); setForm(f => ({ ...f, americanOdds: e.target.value, units: String(suggestUnits(e.target.value)) })); }} />
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
              <div>
                <label style={lbl}>True Probability %</label>
                <input style={inp} type="number" placeholder="75" min="0" max="100" step="0.1" value={form.truePct}
                  onChange={e => set("truePct", e.target.value)} />
              </div>
              <div>
                <label style={lbl}>Units %</label>
                <input style={inp} type="number" placeholder="1" min="0" max="100" step="0.5" value={form.units}
                  onChange={e => set("units", e.target.value)} />
              </div>
              <div>
                <label style={lbl}>Game Date</label>
                <input style={inp} type="date" value={form.gameDate}
                  onChange={e => set("gameDate", e.target.value)} />
              </div>
            </div>
          </div>
          <button type="submit" style={{marginTop:20,width:"100%",padding:"10px",borderRadius:8,
            background:"#238636",border:"none",color:"#fff",fontSize:14,fontWeight:600,cursor:"pointer"}}>
            Add Pick
          </button>
        </form>
      </div>
    </div>
  );
}

  async function loadPlayer(p, activeSport) {
    const sp = activeSport || sport;
    setPlayer(p); setLogs(null); setLogs25(null); setPerGame([]); setDvpData(null); setError(null); setLoading(true);
    const id = Date.now(); fetchRef.current = id;

        const [d26, d25, d24, dv] = await Promise.all([
          fetch(`${WORKER}/gamelog?sport=${sp}&athleteId=${p.id}&season=2026`).then(r => r.ok ? r.json() : null).catch(() => null),
          fetch(`${WORKER}/gamelog?sport=${sp}&athleteId=${p.id}&season=2025`).then(r => r.ok ? r.json() : null).catch(() => null),
          fetch(`${WORKER}/gamelog?sport=${sp}&athleteId=${p.id}&season=2024`).then(r => r.ok ? r.json() : null).catch(() => null),

        const { perGame: pg, isPitcher: isP } = parseGameLog(mergedData, sp);

        const { aggregated: agg25 } = d25 ? parseGameLog(d25, sp) : { aggregated: null };
        // Blend 2025+2026 events as primary season rate; individual years as breakdown bars
        const blendEvents = [...(d25?.events || []), ...(d26?.events || [])];
        const blendBase = d25 || d26;

          ? parseGameLog({ labels: blendBase.labels, events: blendEvents }, sp)

  function parseGameLog(data, sport) {
    const result = {};
    const statConfigs = STAT_CONFIGS[sport] || {};
    Object.keys(statConfigs).forEach(k => result[k] = []);

    const labels = data.labels || [];
    const events = data.events || [];
    const ul = labels.map(l => (l || "").toUpperCase());

    // Helper: get numeric value at first occurrence of a label
    const byLabel = (stats, lbl) => {
      const i = ul.indexOf(lbl);
      if (i === -1) return undefined;
      const v = parseFloat(stats[i]);
      return isNaN(v) ? undefined : v;
    };

    // NFL: YDS appears multiple times — pre-compute indices by context
    const nflCols = {};
    if (sport === "football/nfl") {
      ul.forEach((lbl, i) => {
        const prev = i > 0 ? ul[i - 1] : "";
        if (lbl === "CMP")                       nflCols.cmp     = i;
        if (lbl === "ATT")                       nflCols.att     = i;
        if (lbl === "YDS" && prev === "ATT")     nflCols.passYds = i;
        if (lbl === "YDS" && prev === "CAR")     nflCols.rushYds = i;
        if (lbl === "REC")                       nflCols.rec     = i;
        if (lbl === "TGTS")                      nflCols.tgts    = i;
        if (lbl === "YDS" && prev === "TGTS")    nflCols.recYds  = i;
      });
    }

    // MLB: pitcher vs hitter determined by presence of IP column
    const isPitcher = sport === "baseball/mlb" && ul.includes("IP");
    if (isPitcher) { result.bb = []; result.ip = []; result.hitsAllowed = []; }

    const perGame = [];

    events.forEach(ev => {
      const stats = ev.stats || [];
      const col = key => {
        const i = nflCols[key];
        if (i === undefined) return undefined;
        const v = parseFloat(stats[i]);
        return isNaN(v) ? undefined : v;
      };
      const lv = lbl => byLabel(stats, lbl);
      const gs = {}; // per-game stats for DvP

      if (sport === "basketball/nba") {
        const pts = lv("PTS"), reb = lv("REB"), ast = lv("AST");
        if (pts !== undefined) { result.points?.push(pts); gs.points = pts; }
        if (reb !== undefined) { result.rebounds?.push(reb); gs.rebounds = reb; }
        if (ast !== undefined) { result.assists?.push(ast); gs.assists = ast; }

        const tpm = lv("3PT");
        if (tpm !== undefined) { result.threePointers?.push(tpm); gs.threePointers = tpm; }
      }

      if (sport === "football/nfl") {
        if (col("passYds") !== undefined) { result.passingYards?.push(col("passYds")); gs.passingYards = col("passYds"); }
        if (col("cmp")     !== undefined) { result.completions?.push(col("cmp")); gs.completions = col("cmp"); }
        if (col("att")     !== undefined) { result.attempts?.push(col("att")); gs.attempts = col("att"); }
        if (col("rushYds") !== undefined) { result.rushingYards?.push(col("rushYds")); gs.rushingYards = col("rushYds"); }
        if (col("recYds")  !== undefined) { result.receivingYards?.push(col("recYds")); gs.receivingYards = col("recYds"); }
        if (col("rec")     !== undefined) { result.receptions?.push(col("rec")); gs.receptions = col("rec"); }
      }

      if (sport === "baseball/mlb") {
        if (isPitcher) {
          const k = lv("K");
          const bb = lv("BB");
          const ip = lv("IP");
          const ha = lv("H"); // hits allowed
          if (k  !== undefined) { result.strikeouts?.push(k);  gs.strikeouts = k; }
          if (bb !== undefined) { result.bb?.push(bb); gs.bb = bb; }
          if (ip !== undefined) { result.ip?.push(ip); gs.ip = ip; }
          if (ha !== undefined) { result.hitsAllowed?.push(ha); gs.hitsAllowed = ha; }
        } else {
          const h = lv("H"), hr = lv("HR"), rbi = lv("RBI"), r = lv("R"), b2 = lv("2B"), b3 = lv("3B");
          if (h   !== undefined) { result.hits?.push(h); gs.hits = h; }
          if (hr  !== undefined) { result.homeRuns?.push(hr); gs.homeRuns = hr; }
          // H+R+RBI combined stat
          if (h !== undefined && r !== undefined && rbi !== undefined) {
            const hrr = h + r + rbi; result.hrr?.push(hrr); gs.hrr = hrr;
          }
          // Total bases: H + 2B + 2*3B + 3*HR
          if (h !== undefined && hr !== undefined && b2 !== undefined && b3 !== undefined) {
            const tb = h + b2 + 2*b3 + 3*hr;
            result.totalBases?.push(tb); gs.totalBases = tb;
          }
        }
      }

      if (sport === "hockey/nhl") {
        const sog = lv("SOG") ?? lv("S"), pts = lv("PTS"), sv = lv("SV");
        if (sog !== undefined) { result.shotsOnGoal?.push(sog); gs.shotsOnGoal = sog; }
        if (pts !== undefined) { result.points?.push(pts); gs.points = pts; }
        if (sv  !== undefined) { result.saves?.push(sv); gs.saves = sv; }
      }

      perGame.push({ oppId: ev.oppId || null, oppAbbr: ev.oppAbbr || null, ...gs });
    });

    return { aggregated: result, perGame, isPitcher };
  }

  const statCfgs = (() => {

    const pitcherTabs = ["strikeouts"];

  const tabs = Object.keys(statCfgs);

  const cfg = statCfgs[safeTab];
  const activeLogs = logs?.[safeTab] ?? [];
  const totalGames = activeLogs.length;
  const avg = totalGames > 0 ? (activeLogs.reduce((a,b)=>a+b,0)/totalGames).toFixed(1) : "—";
  const hi  = totalGames > 0 ? Math.max(...activeLogs) : "—";
  const rates = (cfg?.thresholds || []).map(t => {
    const count = activeLogs.filter(v => v >= t).length;
    return { t, count, pct: totalGames > 0 ? (count/totalGames)*100 : 0 };
  });
  // MLB 2025 season rates (secondary bar for truePct blending)
  const isMLB = sport === "baseball/mlb";
  const activeLogs25 = isMLB ? (logs25?.[safeTab] ?? []) : [];
  const totalGames25 = activeLogs25.length;
  const rates25Map = isMLB ? Object.fromEntries((cfg?.thresholds || []).map(t => {
    const count = activeLogs25.filter(v => v >= t).length;
    return [t, totalGames25 > 0 ? (count / totalGames25) * 100 : null];
  })) : {};

  // Fetch Kalshi odds — placed here so safeTab is already defined
  React.useEffect(() => {
    const KALSHI_STATS = {
      "basketball/nba": { points:"points", rebounds:"rebounds", assists:"assists", threePointers:"threePointers" },
      "hockey/nhl":     { goals:"goals", assists:"assists", points:"points" },

                    setCalcOdds(v);
                  }}
                  style={{background:"transparent",border:"none",outline:"none",color:"#c9d1d9",
                    fontSize:14,width:80,padding:"7px 10px",textAlign:"center"}}/>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8,flex:1}}>
                {implied !== null && (
                  <div style={{flex:1,background:"#21262d",borderRadius:5,height:14,overflow:"hidden",minWidth:60}}>
                    <div style={{width:`${implied}%`,background:color,height:"100%",borderRadius:5,transition:"width 0.3s ease"}}/>
                  </div>
                )}
                <span style={{color,fontSize:18,fontWeight:700,minWidth:60,textAlign:"right"}}>
                  {implied !== null ? `${implied.toFixed(1)}%` : "—"}
                </span>
              </div>
            </div>
          );
        })()}
        {(() => {
        if (trackedPlays.length === 0) return null;
        const settled = trackedPlays.filter(p => p.result && p.result !== "dnp");
        const wons = settled.filter(p => p.result === "won").length;

        // P&L calculations (only won/lost picks, DNP excluded)
        let totalStaked = 0, totalPL = 0;
        settled.forEach(p => {
          const stake = ((p.units || 0) / 100) * bankroll;
          totalStaked += stake;
          if (p.result === "won") totalPL += stake * oddsToProfit(p.americanOdds);
          else totalPL -= stake;
        });
        const roi = totalStaked > 0 ? (totalPL / totalStaked) * 100 : null;
        const plColor = totalPL > 0 ? "#3fb950" : totalPL < 0 ? "#f78166" : "#8b949e";
        const fmt = n => (n >= 0 ? "+" : "") + "$" + Math.abs(n).toFixed(2);
        // Average odds across settled picks (average decimal odds → back to American)
        const oddsSettled = settled.filter(p => p.americanOdds != null);
        const avgDecOdds = oddsSettled.length > 0
          ? oddsSettled.reduce((s, p) => s + (p.americanOdds >= 0 ? p.americanOdds/100+1 : 100/Math.abs(p.americanOdds)+1), 0) / oddsSettled.length
          : null;
        const avgAmerican = avgDecOdds != null
          ? avgDecOdds >= 2 ? Math.round((avgDecOdds-1)*100) : Math.round(-100/(avgDecOdds-1))
          : null;
        const avgOddsStr = avgAmerican != null ? (avgAmerican >= 0 ? `+${avgAmerican}` : `${avgAmerican}`) : null;

        return (
          <div>
            {/* Header row */}
            <div style={{display:"flex",alignItems:"center",marginBottom:12,gap:8,flexWrap:"wrap"}}>
              <div style={{color:"#c9d1d9",fontSize:15,fontWeight:700}}>My Picks</div>
              <span style={{background:"#21262d",borderRadius:10,padding:"1px 8px",fontSize:11,color:"#8b949e"}}>
                {trackedPlays.length}
              </span>
              <button onClick={() => setShowAddPick(true)}
                style={{fontSize:11,padding:"2px 10px",borderRadius:6,cursor:"pointer",
                  border:"1px solid #238636",background:"rgba(35,134,54,0.15)",color:"#3fb950",fontWeight:600}}>
                + Add
              </button>
              {/* Bankroll input */}
              <div style={{display:"flex",alignItems:"center",gap:6,marginLeft:"auto"}}>
                <span style={{color:"#484f58",fontSize:11}}>Bankroll</span>
                <div style={{display:"flex",alignItems:"center",background:"#0d1117",border:"1px solid #30363d",borderRadius:6,overflow:"hidden"}}>
                  <span style={{color:"#8b949e",fontSize:12,padding:"2px 6px 2px 8px"}}>$</span>
                  <input type="number" min="1" value={bankroll}
                    onChange={e => setBankroll(e.target.value)}
                    style={{background:"transparent",border:"none",outline:"none",color:"#c9d1d9",
                      fontSize:12,width:70,padding:"3px 6px 3px 0"}}/>
                </div>
              </div>
              <button onClick={() => { if (window.confirm("Clear all settled picks?")) setTrackedPlays(prev => prev.filter(p => !p.result)); }}
                style={{fontSize:10,padding:"2px 8px",borderRadius:6,cursor:"pointer",
                  border:"1px solid #30363d",background:"transparent",color:"#484f58"}}>
                clear settled
              </button>
            </div>

            {/* P&L Summary */}
            {settled.length > 0 && (
              <div style={{background:"#161b22",border:"1px solid #30363d",borderRadius:10,padding:"12px 16px",marginBottom:12}}>
                <div style={{display:"flex",gap:20,flexWrap:"wrap"}}>
                  <div>
                    <div style={{color:"#484f58",fontSize:10,marginBottom:3}}>Record</div>
                    <div style={{fontSize:13,fontWeight:700}}>
                      <span style={{color:"#3fb950"}}>{wons}W</span>
                      <span style={{color:"#484f58"}}> – </span>
                      <span style={{color:"#f78166"}}>{settled.length - wons}L</span>
                      <span style={{color:"#8b949e",fontSize:11,fontWeight:400,marginLeft:5}}>
                        ({((wons / settled.length) * 100).toFixed(0)}%)
                      </span>
                    </div>
                  </div>
                  <div>
                    <div style={{color:"#484f58",fontSize:10,marginBottom:3}}>Total staked</div>
                    <div style={{color:"#c9d1d9",fontSize:13,fontWeight:700}}>${totalStaked.toFixed(2)}</div>
                  </div>
                  <div>
                    <div style={{color:"#484f58",fontSize:10,marginBottom:3}}>Net P&L</div>
                    <div style={{color:plColor,fontSize:13,fontWeight:700}}>{fmt(totalPL)}</div>
                  </div>
                  {roi !== null && (
                    <div>
                      <div style={{color:"#484f58",fontSize:10,marginBottom:3}}>ROI</div>
                      <div style={{color:plColor,fontSize:13,fontWeight:700}}>
                        {roi >= 0 ? "+" : ""}{roi.toFixed(1)}%
                      </div>
                    </div>
                  )}
                  {avgOddsStr && (
                    <div>
                      <div style={{color:"#484f58",fontSize:10,marginBottom:3}}>Avg odds</div>
                      <div style={{color:"#c9d1d9",fontSize:13,fontWeight:700}}>{avgOddsStr}</div>
                    </div>
                  )}
                  <div>
                    <div style={{color:"#484f58",fontSize:10,marginBottom:3}}>Bankroll now</div>
                    <div style={{color:"#c9d1d9",fontSize:13,fontWeight:700}}>${(bankroll + totalPL).toFixed(2)}</div>
                  </div>
                </div>
                {/* P&L bar chart — grouped by day */}
                {(() => {
                  const playsWithPL = [...trackedPlays]
                    .filter(p => p.result && p.result !== "dnp")
                    .sort((a, b) => (a.gameDate || "").localeCompare(b.gameDate || "") || a.trackedAt - b.trackedAt)
                    .map(p => {
                      const s = ((p.units ?? 1) / 100) * bankroll;
                      const pl = p.result === "won" ? s * oddsToProfit(p.americanOdds) : -s;
                      const dateKey = p.gameDate || new Date(p.trackedAt).toISOString().slice(0,10);
                      const [yr,mo,dy] = dateKey.split("-").map(Number);
                      const dateLabel = new Date(yr, mo-1, dy).toLocaleDateString("en-US", { month:"short", day:"numeric" });
                      const barLabel = `${p.playerName} ${p.threshold}+ ${p.stat?.toUpperCase?.() || ""}`.trim();
                      return { pl, dateKey, dateLabel, barLabel };
                    });
                  if (!playsWithPL.length) return null;
                  // Group by day
                  const dayMap = {};
                  playsWithPL.forEach(p => {
                    if (!dayMap[p.dateKey]) dayMap[p.dateKey] = { dateKey: p.dateKey, dateLabel: p.dateLabel, pl: 0, plays: [] };
                    dayMap[p.dateKey].pl += p.pl;
                    dayMap[p.dateKey].plays.push(p);
                  });
                  const days = Object.values(dayMap).sort((a,b) => a.dateKey.localeCompare(b.dateKey));
                  const maxAbs = Math.max(...days.map(d => Math.abs(d.pl)), 0.01);
                  const HALF = 60;
                  const yMax = maxAbs;
                  const yTicks = [yMax, yMax/2, 0, -yMax/2, -yMax];
                  return (
                    <div style={{marginTop:12,paddingTop:12,borderTop:"1px solid #21262d"}}>
                      <div style={{display:"flex",gap:4}}>
                        {/* Y-axis labels */}
                        <div style={{display:"flex",flexDirection:"column",justifyContent:"space-between",height:HALF*2+20,paddingBottom:20,flexShrink:0}}>
                          {yTicks.map((v,i) => (
                            <div key={i} style={{color:"#484f58",fontSize:9,textAlign:"right",lineHeight:1}}>
                              {v >= 0 ? "+" : ""}${Math.abs(v).toFixed(v === 0 ? 0 : 1)}
                            </div>
                          ))}
                        </div>
                        {/* Bars + x-axis */}
                        <div style={{flex:1,display:"flex",flexDirection:"column"}}>
                          <div style={{position:"relative",height:HALF*2,display:"flex",gap:3,alignItems:"stretch"}}>
                            <div style={{position:"absolute",left:0,right:0,top:HALF,height:1,background:"#30363d",zIndex:1}}/>
                            {days.map((day, i) => (
                              <DayBar key={i} day={day} HALF={HALF} maxAbs={maxAbs} />
                            ))}
                          </div>
                          {/* X-axis date labels */}
                          <div style={{display:"flex",gap:3,marginTop:3}}>
                            {days.map((day, i) => (
                              <div key={i} style={{flex:1,textAlign:"center",color:"#484f58",fontSize:8,lineHeight:1.2,overflow:"hidden"}}>
                                {day.dateLabel}
                              </div>
                            ))}
                          </div>
                        </div>
                      </div>
                    </div>
                  );
                })()}
              </div>
            )}

            {/* Model Calibration panel — shows after 5+ outcomes */}
            {Object.keys(calibration).length > 0 && (() => {
              const rows = Object.entries(calibration)
                .filter(([, d]) => d.n >= 5)
                .sort(([, a], [, b]) => b.n - a.n);
              if (rows.length === 0) return null;
              return (
                <div style={{background:"#0d1117",border:"1px solid #21262d",borderRadius:8,padding:"10px 14px",marginBottom:12}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                    <span style={{color:"#484f58",fontSize:10,textTransform:"uppercase",letterSpacing:".5px"}}>Model Calibration</span>
                    <div style={{flex:1,height:1,background:"#21262d"}}/>
                    <span style={{color:"#484f58",fontSize:9}}>actual vs predicted · {rows[0][1].n >= 15 ? "correction active" : "collecting data"}</span>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:5}}>
                    {rows.map(([key, d]) => {
                      const [sp, st] = key.split(":");
                      const drift = d.winRate - d.avgPredicted;
                      const driftColor = Math.abs(drift) < 3 ? "#3fb950" : drift > 0 ? "#58a6ff" : "#f78166";
                      const corrLabel = d.corrFactor !== null
                        ? (d.corrFactor > 1 ? `↑${((d.corrFactor-1)*100).toFixed(0)}%` : `↓${((1-d.corrFactor)*100).toFixed(0)}%`)
                        : `${d.n}/15`;
                      return (
                        <div key={key} style={{display:"flex",alignItems:"center",gap:8,fontSize:10}}>
                          <span style={{color:"#8b949e",width:100,flexShrink:0,textTransform:"capitalize"}}>{sp} {st}</span>
                          <div style={{flex:1,background:"#21262d",borderRadius:3,height:6,overflow:"hidden",position:"relative"}}>
                            <div style={{position:"absolute",left:0,top:0,bottom:0,width:`${d.avgPredicted}%`,background:"#333d47",borderRadius:3}}/>
                            <div style={{position:"absolute",left:0,top:0,bottom:0,width:`${d.winRate}%`,background:driftColor,borderRadius:3,opacity:0.8}}/>
                          </div>
                          <span style={{color:driftColor,width:36,textAlign:"right",fontWeight:600}}>
                            {d.winRate}%
                          </span>
                          <span style={{color:"#484f58",width:28,textAlign:"right"}}>{d.avgPredicted}%</span>
                          <span style={{color: d.corrFactor !== null ? driftColor : "#484f58", width:32, textAlign:"right", fontWeight:600}}>{corrLabel}</span>
                          <span style={{color:"#333d47",width:20,textAlign:"right"}}>{d.n}n</span>
                        </div>
                      );
                    })}
                    <div style={{display:"flex",gap:16,marginTop:2,fontSize:9,color:"#333d47"}}>
                      <span><span style={{color:"#3fb950"}}>■</span> actual win rate</span>
                      <span><span style={{color:"#484f58"}}>■</span> model predicted avg</span>
                      <span>correction = actual/predicted (active at 15+)</span>
                    </div>
                  </div>
                </div>
              );
            })()}

            {/* Pick cards — open first (newest→oldest), then settled (newest→oldest) */}
            {[...trackedPlays]
              .sort((a, b) => {
                const aOpen = !a.result, bOpen = !b.result;
                if (aOpen !== bOpen) return aOpen ? -1 : 1;
                return b.trackedAt - a.trackedAt;
              })
              .map(pick => {
              const oddsStr = pick.americanOdds >= 0 ? `+${pick.americanOdds}` : `${pick.americanOdds}`;
              const dateStr = pick.gameDate
                ? (() => { const [yr,mo,dy] = pick.gameDate.split("-").map(Number); return new Date(yr, mo-1, dy).toLocaleDateString("en-US", { month:"short", day:"numeric" }); })()
                : new Date(pick.trackedAt).toLocaleDateString("en-US", { month:"short", day:"numeric" });
              const resultColor = pick.result === "won" ? "#3fb950" : pick.result === "lost" ? "#f78166" : pick.result === "dnp" ? "#8b949e" : null;
              const units = pick.units ?? 1;
              const stake = (units / 100) * bankroll;
              let pickPL = null;
              if (pick.result === "won") pickPL = stake * oddsToProfit(pick.americanOdds);
              else if (pick.result === "lost") pickPL = -stake;
              // DNP = void, pickPL stays null
              const pickPLColor = pickPL > 0 ? "#3fb950" : pickPL < 0 ? "#f78166" : "#8b949e";
              return (
                <div key={pick.id} style={{background:"#161b22",
                  border:`1px solid ${resultColor ? resultColor + "44" : "#30363d"}`,
                  borderRadius:10, padding:"12px 14px", marginBottom:8}}>
                  {/* Top row: name + result controls */}
                  <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
                    {/* Player info */}
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3,flexWrap:"wrap"}}>
                        {/* Clickable name → opens player card */}
                        <span onClick={() => navigateToPlay(pick)}
                          style={{color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",textDecoration:"underline",textDecorationColor:"#30363d",textUnderlineOffset:2}}>
                          {pick.playerName}
                        </span>
                        {pick.sport && (
                          <span style={{border:`1px solid ${SPORT_BADGE_COLOR[pick.sport]||"#8b949e"}`,
                            borderRadius:4,padding:"0px 4px",fontSize:9,color:SPORT_BADGE_COLOR[pick.sport]||"#8b949e",fontWeight:600,textTransform:"uppercase"}}>
                            {pick.sport}
                          </span>
                        )}
                        {pick.edge != null && (
                          <span style={{background:"rgba(63,185,80,0.12)",border:"1px solid #3fb950",borderRadius:4,
                            padding:"0px 5px",fontSize:10,color:"#3fb950",fontWeight:700}}>
                            +{pick.edge}%
                          </span>
                        )}
                        {pick.result && (
                          <span style={{fontSize:11,fontWeight:700,color:resultColor,textTransform:"uppercase",letterSpacing:0.5}}>
                            {pick.result === "won" ? "✓ Won" : pick.result === "lost" ? "✗ Lost" : "— DNP"}
                          </span>
                        )}
                        {pickPL !== null && (
                          <span style={{fontSize:11,fontWeight:700,color:pickPLColor,marginLeft:2}}>
                            {fmt(pickPL)}
                          </span>
                        )}
                      </div>
                      <div style={{color:"#8b949e",fontSize:11}}>
                        {pick.playerTeam} vs {pick.opponent}
                        {" · "}<span style={{color:"#58a6ff",fontWeight:600}}>{pick.threshold}+ {STAT_LABEL[pick.stat] || pick.stat}</span>
                        {" · "}<span style={{color:"#a855f7"}}>{oddsStr}</span>
                        {" · "}<span style={{color:"#e3b341"}}>{pick.truePct}% true</span>
                        {" · "}<span style={{color:"#484f58"}}>{dateStr}</span>
                      </div>
                      {/* Edit mode: full inline form */}
                      {editPickId === pick.id && (() => {
                        const SPORT_STATS_EDIT = {
                          nba:["points","rebounds","assists","threePointers"],
                          mlb:["hits","homeRuns","hrr","totalBases","strikeouts"],
                          nfl:["passingYards","rushingYards","receivingYards","receptions"],
                          nhl:["goals","assists","points","shotsOnGoal"],
                        };
                        const ei = { background:"#0d1117", border:"1px solid #30363d", borderRadius:5, color:"#c9d1d9", fontSize:12, padding:"4px 7px", outline:"none", width:"100%" };
                        return (
                          <div style={{marginTop:10,padding:10,background:"#0d1117",borderRadius:7,border:"1px solid #30363d"}}>
                            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                              <div>
                                <div style={{color:"#484f58",fontSize:10,marginBottom:3}}>Stat</div>
                                <select style={ei} value={pick.stat}
                                  onChange={e => setTrackedPlays(prev => prev.map(p => p.id === pick.id ? {...p, stat: e.target.value} : p))}>
                                  {(SPORT_STATS_EDIT[pick.sport] || []).map(s => <option key={s} value={s}>{STAT_LABEL[s] || s}</option>)}
                                </select>
                              </div>
                              <div>
                                <div style={{color:"#484f58",fontSize:10,marginBottom:3}}>Line</div>
                                <input style={ei} type="number" step="0.5" defaultValue={pick.threshold}
                                  onBlur={e => { const v = parseFloat(e.target.value); if (!isNaN(v)) setTrackedPlays(prev => prev.map(p => p.id === pick.id ? {...p, threshold: v} : p)); }} />
                              </div>
                              <div>
                                <div style={{color:"#484f58",fontSize:10,marginBottom:3}}>Odds</div>
                                <input style={ei} type="number" defaultValue={pick.americanOdds}
                                  onBlur={e => { const v = parseInt(e.target.value); if (!isNaN(v)) setTrackedPlays(prev => prev.map(p => p.id === pick.id ? {...p, americanOdds: v, kalshiPct: parseFloat((v < 0 ? Math.abs(v)/(Math.abs(v)+100)*100 : 100/(v+100)*100).toFixed(1))} : p)); }} />
                              </div>
                              <div>
                                <div style={{color:"#484f58",fontSize:10,marginBottom:3}}>True Prob %</div>
                                <input style={ei} type="number" min="0" max="100" step="0.1" defaultValue={pick.truePct ?? ""}
                                  onBlur={e => { const v = parseFloat(e.target.value); setTrackedPlays(prev => prev.map(p => { if (p.id !== pick.id) return p; const kp = p.kalshiPct ?? p.americanOdds < 0 ? Math.abs(p.americanOdds)/(Math.abs(p.americanOdds)+100)*100 : 100/(p.americanOdds+100)*100; return {...p, truePct: isNaN(v) ? null : v, edge: isNaN(v) ? null : parseFloat((v - kp).toFixed(1))}; })); }} />
                              </div>
                              <div style={{gridColumn:"1 / -1"}}>
                                <div style={{color:"#484f58",fontSize:10,marginBottom:3}}>Game Date</div>
                                <input style={ei} type="date" defaultValue={pick.gameDate || ""}
                                  onBlur={e => { const v = e.target.value; setTrackedPlays(prev => prev.map(p => p.id === pick.id ? {...p, gameDate: v || null} : p)); }} />
                              </div>
                            </div>
                            <button onClick={() => setEditPickId(null)}
                              style={{width:"100%",padding:"4px",borderRadius:5,background:"rgba(88,166,255,0.12)",border:"1px solid #58a6ff",color:"#58a6ff",fontSize:11,fontWeight:600,cursor:"pointer"}}>
                              done
                            </button>
                          </div>
                        );
                      })()}
                    </div>
                    {/* Controls */}
                    <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
                      {!pick.result ? (
                        <>
                          <button onClick={() => setPlayResult(pick.id, "won")}
                            style={{background:"rgba(63,185,80,0.12)",border:"1px solid #3fb950",borderRadius:6,
                              padding:"3px 10px",fontSize:11,fontWeight:600,color:"#3fb950",cursor:"pointer"}}>
                            ✓ Won
                          </button>
                          <button onClick={() => setPlayResult(pick.id, "lost")}
                            style={{background:"rgba(247,129,102,0.12)",border:"1px solid #f78166",borderRadius:6,
                              padding:"3px 10px",fontSize:11,fontWeight:600,color:"#f78166",cursor:"pointer"}}>
                            ✗ Lost
                          </button>
                          <button onClick={() => setPlayResult(pick.id, "dnp")}
                            style={{background:"rgba(139,148,158,0.12)",border:"1px solid #484f58",borderRadius:6,
                              padding:"3px 10px",fontSize:11,fontWeight:600,color:"#8b949e",cursor:"pointer"}}>
                            DNP
                          </button>
                        </>
                      ) : (
                        <button onClick={() => setPlayResult(pick.id, null)}
                          style={{background:"transparent",border:"1px solid #30363d",borderRadius:6,
                            padding:"3px 8px",fontSize:11,color:"#484f58",cursor:"pointer"}}>
                          undo
                        </button>
                      )}
                      <button onClick={() => setEditPickId(id => id === pick.id ? null : pick.id)} title="Edit line"
                        style={{background: editPickId === pick.id ? "rgba(88,166,255,0.12)" : "transparent",
                          border:`1px solid ${editPickId === pick.id ? "#58a6ff" : "#30363d"}`,borderRadius:6,
                          padding:"3px 7px",fontSize:11,color: editPickId === pick.id ? "#58a6ff" : "#484f58",cursor:"pointer"}}>
                        ✎
                      </button>
                      <button onClick={() => untrackPlay(pick.id)} title="Remove"
                        style={{background:"transparent",border:"1px solid #30363d",borderRadius:6,
                          padding:"3px 7px",fontSize:12,color:"#484f58",cursor:"pointer"}}>
                        ×
                      </button>
                    </div>
                  </div>
                  {/* Unit size row */}
                  <div style={{display:"flex",alignItems:"center",gap:8,marginTop:10,paddingTop:8,borderTop:"1px solid #21262d"}}>
                    <span style={{color:"#484f58",fontSize:11}}>Unit size</span>
                    <div style={{display:"flex",alignItems:"center",background:"#0d1117",border:"1px solid #30363d",borderRadius:6,overflow:"hidden"}}>
                      <input type="number" min="0" max="100" step="0.5" value={units}
                        onChange={e => setPickUnits(pick.id, e.target.value)}
                        style={{background:"transparent",border:"none",outline:"none",color:"#c9d1d9",
                          fontSize:12,width:46,padding:"3px 4px 3px 8px",textAlign:"right"}}/>
                      <span style={{color:"#8b949e",fontSize:12,padding:"2px 8px 2px 2px"}}>%</span>
                    </div>
                    <span style={{color:"#484f58",fontSize:11}}>
                      = <span style={{color:"#8b949e"}}>${stake.toFixed(2)}</span>
                      {" stake"}
                    </span>
                    {pick.result === "won" && (
                      <span style={{fontSize:11,color:"#484f58",marginLeft:4}}>
                        → win <span style={{color:"#3fb950",fontWeight:600}}>${(stake * oddsToProfit(pick.americanOdds)).toFixed(2)}</span>
                      </span>
                    )}
                  </div>
                </div>
              );
            })}

          </div>
        );
      })()}
        </div>
        </div>
      )}

      <div style={{color:"#484f58",fontSize:11,marginTop:12,textAlign:"center"}}>
        Powered by ESPN API · via Cloudflare Worker proxy
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
