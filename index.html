<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sports Stat Thresholds</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="config.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; font-family: 'Segoe UI', sans-serif; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const WORKER = (typeof CONFIG !== "undefined" ? CONFIG.WORKER_URL : "https://YOUR_WORKER.YOUR_SUBDOMAIN.workers.dev");

const SPORTS = [
  { label: "NBA",  value: "basketball/nba" },
  { label: "NFL",  value: "football/nfl" },
  { label: "MLB",  value: "baseball/mlb" },
  { label: "NHL",  value: "hockey/nhl" },
];

const STAT_CONFIGS = {
  "basketball/nba": {
    points:   { label: "Points",   thresholds: [10,15,20,25,30,35,40], unit: "PTS" },
    rebounds: { label: "Rebounds", thresholds: [4,6,8,10,12,14,16],    unit: "REB" },
    assists:  { label: "Assists",  thresholds: [2,3,4,5,6,7,8,9,10],   unit: "AST" },
  },
  "football/nfl": {
    passingYards:  { label: "Pass Yds",  thresholds: [150,200,250,300,350,400], unit: "YDS" },
    touchdowns:    { label: "Pass TDs",  thresholds: [1,2,3,4,5],              unit: "TD"  },
    rushingYards:  { label: "Rush Yds",  thresholds: [25,50,75,100,125,150],   unit: "YDS" },
  },
  "baseball/mlb": {
    hits:    { label: "Hits",    thresholds: [1,2,3,4],       unit: "H"   },
    rbi:     { label: "RBI",     thresholds: [1,2,3,4,5],     unit: "RBI" },
    runs:    { label: "Runs",    thresholds: [1,2,3],         unit: "R"   },
  },
  "hockey/nhl": {
    points:  { label: "Points",  thresholds: [1,2,3,4],   unit: "PTS" },
    goals:   { label: "Goals",   thresholds: [1,2,3],     unit: "G"   },
    assists: { label: "Assists", thresholds: [1,2,3,4],   unit: "AST" },
  },
};

const getColor = p => p >= 80 ? "#3fb950" : p >= 60 ? "#58a6ff" : p >= 40 ? "#d29922" : "#f78166";

function useDebounce(val, ms) {
  const [dv, setDv] = React.useState(val);
  React.useEffect(() => {
    const t = setTimeout(() => setDv(val), ms);
    return () => clearTimeout(t);
  }, [val, ms]);
  return dv;
}

function App() {
  const [sport, setSport] = React.useState("basketball/nba");
  const [query, setQuery] = React.useState("");
  const [suggestions, setSuggestions] = React.useState([]);
  const [showDrop, setShowDrop] = React.useState(false);
  const [activeIdx, setActiveIdx] = React.useState(-1);
  const [player, setPlayer] = React.useState(null);
  const [logs, setLogs] = React.useState(null);
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState(null);
  const [activeTab, setActiveTab] = React.useState("points");
  const [searching, setSearching] = React.useState(false);
  const debouncedQuery = useDebounce(query, 300);
  const dropRef = React.useRef(null);
  const inputRef = React.useRef(null);
  const fetchRef = React.useRef(null);

  React.useEffect(() => {
    const h = e => {
      if (!dropRef.current?.contains(e.target) && !inputRef.current?.contains(e.target))
        setShowDrop(false);
    };
    document.addEventListener("mousedown", h);
    return () => document.removeEventListener("mousedown", h);
  }, []);

  // Preload Jokic
  React.useEffect(() => {
    loadPlayer({ id: "3032977", name: "Nikola Jokic", team: "DEN" });
  }, []);

  React.useEffect(() => {
    if (debouncedQuery.trim().length < 2) { setSuggestions([]); setShowDrop(false); return; }
    setSearching(true);
    fetch(`${WORKER}/athletes?sport=${sport}&q=${encodeURIComponent(debouncedQuery)}`)
      .then(r => r.json())
      .then(data => {
        console.log("search response:", JSON.stringify(data));
        const items = (data.items || []).map(a => ({ id: a.id, name: a.name, team: a.team || "" }));
        console.log("mapped items:", items);
        setSuggestions(items);
        setShowDrop(items.length > 0);
      })
      .catch(e => { console.error("search error:", e); setSuggestions([]); })
      .finally(() => setSearching(false));
  }, [debouncedQuery, sport]);

  async function loadPlayer(p) {
    setPlayer(p); setLogs(null); setError(null); setLoading(true);
    const id = Date.now(); fetchRef.current = id;
    try {
      const season = sport === "football/nfl" ? "2025" : "2026";
      const url = `${WORKER}/gamelog?sport=${sport}&athleteId=${p.id}&season=${season}`;
      console.log("fetching gamelog:", url);
      const res = await fetch(url);
      const data = await res.json();
      console.log("gamelog response:", JSON.stringify(data).slice(0, 500));
      if (fetchRef.current !== id) return;
      const parsed = parseGameLog(data, sport);
      console.log("parsed logs:", parsed);
      setLogs(parsed);
    } catch(e) {
      console.error("gamelog error:", e);
      if (fetchRef.current !== id) return;
      setError("Could not load game log: " + e.message);
    }
    setLoading(false);
  }

  function parseGameLog(data, sport) {
    const result = {};
    const statConfigs = STAT_CONFIGS[sport] || {};
    Object.keys(statConfigs).forEach(k => result[k] = []);

    console.log("raw gamelog keys:", Object.keys(data));
    console.log("categories sample:", JSON.stringify(data.categories || data.seasonTypes || "none").slice(0, 600));

    // ESPN format: top-level labels[], seasonTypes[].categories[].events[].stats[]
    // Worker now returns flat {labels, events, totalGames}
    const labels = data.labels || [];
    const events = data.events || [];
    console.log("total games:", events.length, "labels:", labels);

    events.forEach(ev => {
      const stats = ev.stats || [];
      stats.forEach((val, i) => {
        const lbl = (labels[i] || "").toUpperCase();
        const n = parseFloat(val);
        if (isNaN(n)) return;
        if (lbl === "PTS") result.points?.push(n);
        if (lbl === "REB") result.rebounds?.push(n);
        if (lbl === "AST") result.assists?.push(n);
        if (lbl === "PYD" || lbl === "PASSYDS") result.passingYards?.push(n);
        if (lbl === "RYD" || lbl === "RUSHYDS") result.rushingYards?.push(n);
        if (lbl === "PTD" || lbl === "TD")      result.touchdowns?.push(n);
        if (lbl === "H")   result.hits?.push(n);
        if (lbl === "RBI") result.rbi?.push(n);
        if (lbl === "G")   result.goals?.push(n);
      });
    });

    console.log("AST values:", result.assists);
    console.log("PTS values:", result.points);

    console.log("parsed result:", JSON.stringify(result).slice(0, 200));
    return result;
  }

  const selectPlayer = p => {
    setQuery(""); setSuggestions([]); setShowDrop(false); setActiveIdx(-1);
    loadPlayer(p);
  };

  const handleKeyDown = e => {
    if (!showDrop) return;
    if (e.key === "ArrowDown") { e.preventDefault(); setActiveIdx(i => Math.min(i+1, suggestions.length-1)); }
    else if (e.key === "ArrowUp") { e.preventDefault(); setActiveIdx(i => Math.max(i-1, 0)); }
    else if (e.key === "Enter" && activeIdx >= 0) selectPlayer(suggestions[activeIdx]);
    else if (e.key === "Escape") setShowDrop(false);
  };

  const highlight = (name, q) => {
    const i = name.toLowerCase().indexOf(q.toLowerCase());
    if (i === -1) return <span>{name}</span>;
    return (
      <span>
        {name.slice(0, i)}
        <strong style={{color:"#fff"}}>{name.slice(i, i + q.length)}</strong>
        {name.slice(i + q.length)}
      </span>
    );
  };

  const statCfgs = STAT_CONFIGS[sport] || {};
  const tabs = Object.keys(statCfgs);
  const safeTab = tabs.includes(activeTab) ? activeTab : tabs[0];
  const cfg = statCfgs[safeTab];
  const activeLogs = logs?.[safeTab] ?? [];
  const totalGames = activeLogs.length;
  const avg = totalGames > 0 ? (activeLogs.reduce((a,b)=>a+b,0)/totalGames).toFixed(1) : "—";
  const hi  = totalGames > 0 ? Math.max(...activeLogs) : "—";
  const rates = (cfg?.thresholds || []).map(t => {
    const count = activeLogs.filter(v => v >= t).length;
    return { t, count, pct: totalGames > 0 ? (count/totalGames)*100 : 0 };
  });

  return (
    <div style={{maxWidth:640,margin:"0 auto",padding:"24px 16px"}}>

      {/* Sport tabs */}
      <div style={{display:"flex",gap:6,marginBottom:18}}>
        {SPORTS.map(s => (
          <button key={s.value} onClick={() => { setSport(s.value); setPlayer(null); setLogs(null); setActiveTab("points"); }}
            style={{flex:1,padding:"9px 0",borderRadius:8,border:"1px solid",cursor:"pointer",fontSize:13,
              borderColor: sport===s.value ? "#58a6ff":"#30363d",
              background: sport===s.value ? "rgba(88,166,255,0.12)":"#161b22",
              color: sport===s.value ? "#58a6ff":"#8b949e",
              fontWeight: sport===s.value ? 700:400}}>
            {s.label}
          </button>
        ))}
      </div>

      {/* Search */}
      <div style={{position:"relative",marginBottom:22}}>
        <span style={{position:"absolute",left:13,top:"50%",transform:"translateY(-50%)",fontSize:15,pointerEvents:"none",zIndex:1}}>
          {searching ? "⏳" : "🔍"}
        </span>
        <input ref={inputRef} value={query}
          onChange={e => { setQuery(e.target.value); setActiveIdx(-1); }}
          onKeyDown={handleKeyDown}
          onFocus={() => suggestions.length > 0 && setShowDrop(true)}
          placeholder={player ? `Search player… (${player.name})` : `Search ${SPORTS.find(s=>s.value===sport)?.label} player…`}
          style={{width:"100%",background:"#161b22",border:"1px solid #30363d",borderRadius:10,
            color:"#fff",fontSize:14,padding:"12px 14px 12px 40px",outline:"none"}}
        />
        {showDrop && suggestions.length > 0 && (
          <div ref={dropRef} style={{position:"absolute",top:"calc(100% + 6px)",left:0,right:0,
            background:"#161b22",border:"1px solid #30363d",borderRadius:10,overflow:"hidden",
            zIndex:100,boxShadow:"0 8px 24px rgba(0,0,0,0.6)"}}>
            {suggestions.map((p,i) => (
              <div key={p.id} onMouseDown={() => selectPlayer(p)}
                onMouseEnter={() => setActiveIdx(i)}
                style={{padding:"10px 16px",cursor:"pointer",fontSize:14,color:"#c9d1d9",
                  borderBottom: i<suggestions.length-1?"1px solid #21262d":"none",
                  background: activeIdx===i?"rgba(88,166,255,0.12)":"transparent",
                  display:"flex",alignItems:"center",justifyContent:"space-between"}}
              >
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <span>🏃</span>
                  {highlight(p.name, query)}
                </div>
                <span style={{color:"#484f58",fontSize:11}}>{p.team}</span>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Player header */}
      {player && (
        <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:20}}>
          <div style={{background:"linear-gradient(135deg,#1a3a6b,#0066cc)",borderRadius:12,width:50,height:50,
            display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>🏅</div>
          <div>
            <h1 style={{color:"#fff",margin:0,fontSize:19,fontWeight:700}}>{player.name}</h1>
            <div style={{color:"#8b949e",fontSize:12}}>{player.team} · {SPORTS.find(s=>s.value===sport)?.label} 2025-26</div>
          </div>
          <div style={{marginLeft:"auto",display:"flex",gap:8}}>
            {[["AVG",avg],["HIGH",hi],["GP",totalGames]].map(([l,v]) => (
              <div key={l} style={{background:"#161b22",border:"1px solid #30363d",borderRadius:8,padding:"7px 11px",textAlign:"center"}}>
                <div style={{color:"#58a6ff",fontSize:16,fontWeight:700}}>{loading?"…":v}</div>
                <div style={{color:"#8b949e",fontSize:10}}>{l}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Stat tabs */}
      {player && (
        <div style={{display:"flex",gap:6,marginBottom:18}}>
          {tabs.map(k => (
            <button key={k} onClick={() => setActiveTab(k)} style={{flex:1,padding:"9px 0",borderRadius:8,
              border:"1px solid",cursor:"pointer",fontSize:13,
              borderColor: safeTab===k?"#58a6ff":"#30363d",
              background: safeTab===k?"rgba(88,166,255,0.12)":"#161b22",
              color: safeTab===k?"#58a6ff":"#8b949e",
              fontWeight: safeTab===k?700:400}}>
              {statCfgs[k].label}
            </button>
          ))}
        </div>
      )}

      {/* Chart */}
      {player && (
        <div style={{background:"#161b22",border:"1px solid #30363d",borderRadius:12,padding:"20px 22px"}}>
          {loading ? (
            <div style={{color:"#8b949e",textAlign:"center",padding:48,fontSize:13}}>⏳ Loading game log…</div>
          ) : error ? (
            <div style={{color:"#f78166",textAlign:"center",padding:48,fontSize:13}}>⚠️ {error}</div>
          ) : totalGames === 0 ? (
            <div style={{color:"#8b949e",textAlign:"center",padding:48,fontSize:13}}>No game data found.</div>
          ) : (
            <>
              <div style={{color:"#8b949e",fontSize:12,marginBottom:18}}>
                % of games recording <strong style={{color:"#c9d1d9"}}>at least N {cfg.unit}</strong>
              </div>
              {rates.map(({t,count,pct}) => {
                const color = getColor(pct);
                return (
                  <div key={t} style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
                    <div style={{color:"#8b949e",fontSize:13,width:40,textAlign:"right",flexShrink:0}}>{t}+</div>
                    <div style={{flex:1,background:"#21262d",borderRadius:5,height:18,overflow:"hidden"}}>
                      <div style={{width:`${pct}%`,background:color,height:"100%",borderRadius:5,transition:"width 0.5s ease",minWidth:pct>0?4:0}}/>
                    </div>
                    <div style={{color,fontSize:13,fontWeight:700,width:46,textAlign:"right",flexShrink:0}}>{pct.toFixed(1)}%</div>
                    <div style={{color:"#484f58",fontSize:11,width:52,flexShrink:0}}>{count}/{totalGames}g</div>
                  </div>
                );
              })}
              <div style={{display:"flex",gap:14,flexWrap:"wrap",marginTop:18,paddingTop:14,borderTop:"1px solid #21262d"}}>
                {[["#3fb950","≥ 80%"],["#58a6ff","60–79%"],["#d29922","40–59%"],["#f78166","< 40%"]].map(([color,label]) => (
                  <div key={label} style={{display:"flex",alignItems:"center",gap:5}}>
                    <div style={{width:9,height:9,borderRadius:2,background:color}}/>
                    <span style={{color:"#8b949e",fontSize:11}}>{label}</span>
                  </div>
                ))}
              </div>
            </>
          )}
        </div>
      )}

      {!player && !loading && (
        <div style={{color:"#484f58",textAlign:"center",padding:60,fontSize:14}}>
          Search for a player above to see their stat thresholds
        </div>
      )}

      <div style={{color:"#484f58",fontSize:11,marginTop:12,textAlign:"center"}}>
        Powered by ESPN API · via Cloudflare Worker proxy
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
